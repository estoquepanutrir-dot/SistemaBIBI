<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Impede que navegador/CDN sirva HTML em cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Bibi Papelaria - Sistema PDV</title>
  <link rel="icon" type="image/png" href="logo.png" />

  <!-- PWA: esconde a barra de endereços ao instalar como app -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bibi PDV" />
  <meta name="theme-color" content="#ec4899" />
  <script>
    // ── Service Worker com detecção de atualização automática ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');

          // Verifica atualizações a cada 60 segundos enquanto o app está aberto
          setInterval(() => reg.update(), 60000);

          // Quando um novo SW está esperando, mostra o banner de atualização
          function onNewSW(sw) {
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed') mostrarBannerAtualizacao(sw);
            });
          }

          if (reg.waiting) {
            mostrarBannerAtualizacao(reg.waiting);
          }
          reg.addEventListener('updatefound', () => {
            onNewSW(reg.installing);
          });

          // Quando o SW ativo muda (após skipWaiting), recarrega a página
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });

        } catch (err) {
          console.warn('[SW] Registro falhou:', err);
        }
      });
    }

    function mostrarBannerAtualizacao(sw) {
      const banner = document.getElementById('update-banner');
      if (!banner) return;
      banner.style.display = 'flex';
      document.getElementById('update-btn').onclick = () => {
        sw.postMessage('SKIP_WAITING');
        banner.style.display = 'none';
      };
    }
  </script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #fdf4f7; color: #374151; }
    body::selection, ::selection { background: #fbcfe8; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #fdf2f8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

    @keyframes fadeIn   { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
    @keyframes bounceIn { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes toastIn  { from{opacity:0;transform:translateX(120%)} to{opacity:1;transform:translateX(0)} }

    .animate-fadeIn   { animation: fadeIn .35s ease both; }
    .animate-slideIn  { animation: slideIn .3s ease both; }
    .animate-bounceIn { animation: bounceIn .4s cubic-bezier(.36,.07,.19,.97) both; }
    .animate-spin-slow{ animation: spin 1.2s linear infinite; }
    .animate-pulse    { animation: pulse 1.5s ease-in-out infinite; }
    .toast-enter      { animation: toastIn .35s cubic-bezier(.21,1.02,.73,1) both; }

    .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 2px solid #fce7f3; }

    .field:focus { outline:none; border-color:#f472b6; box-shadow:0 0 0 4px rgba(244,114,182,0.12); }

    .sidebar-trans { transition: transform .28s cubic-bezier(.4,0,.2,1); }

    .lift { transition: transform .2s ease, box-shadow .2s ease; }
    .lift:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .lift:active { transform: translateY(0); }

    .solid-card { background: #ffffff; border: 2px solid #f3f4f6; border-radius: 1.5rem; }
  </style>
</head>
<body>
  <!-- Banner de atualização disponível -->
  <div id="update-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1e293b;color:#fff;padding:14px 20px;align-items:center;justify-content:space-between;gap:12px;font-family:sans-serif;font-size:14px;box-shadow:0 -4px 20px rgba(0,0,0,0.3);">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:20px;">🆕</span>
      <span><strong>Nova versão disponível!</strong> Atualize para usar as últimas funcionalidades.</span>
    </div>
    <button id="update-btn" style="background:#ec4899;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-weight:900;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;">
      Atualizar agora
    </button>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = window.React;

    const API_URL = "https://script.google.com/macros/s/AKfycbxKfJHmXCmunUA2PGKXgwWAX4bkTklgNYurQIAZtoTQjHRar6_tepjmJHxCCo0RhJD9/exec";
    const USERS = [{ user: "admin", pass: "bibi2025" }];

    function generateCode() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let code = "PRD-";
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function useApi() {
      const call = useCallback(async (action, payload = {}) => {
        try {
          const res = await fetch(`${API_URL}?action=${action}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action, ...payload }),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error("[API]", action, e);
          return { success: false, error: e.message };
        }
      }, []);
      return { call };
    }

    function Toast({ toasts }) {
      return (
        <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className={`toast-enter pointer-events-auto flex items-center gap-3 px-5 py-3.5 rounded-2xl text-sm font-bold shadow-xl border-2 bg-white ${
              t.type === "success" ? "border-emerald-300 text-emerald-600" :
              t.type === "warn"    ? "border-yellow-300 text-yellow-600"   :
              "border-red-300 text-red-500"
            }`}>
              <span className="text-lg">{t.type === "success" ? "✨" : t.type === "warn" ? "⚠️" : "❌"}</span>
              <span>{t.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    function Modal({ open, onClose, title, children, wide }) {
      useEffect(() => {
        if (open) document.body.style.overflow = "hidden";
        else document.body.style.overflow = "";
        return () => { document.body.style.overflow = ""; };
      }, [open]);
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
             onClick={e => e.target === e.currentTarget && onClose()}>
          <div className={`animate-bounceIn bg-white rounded-3xl p-6 w-full shadow-2xl ${wide ? "max-w-lg" : "max-w-md"}`}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-xl font-black text-pink-500">{title}</h2>
              <button onClick={onClose}
                className="w-8 h-8 flex items-center justify-center rounded-full bg-pink-50 text-pink-400 hover:bg-pink-100 font-bold text-xl transition-colors">✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function Field({ label, children }) {
      return (
        <div>
          <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">{label}</label>
          {children}
        </div>
      );
    }
    const inputCls = "field w-full bg-white border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-700 font-semibold transition-all";

    function StatCard({ icon, label, value, sub, color, bg }) {
      return (
        <div className="lift bg-white rounded-3xl p-5 flex flex-col gap-3 shadow-sm border-2 border-gray-100">
          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-2xl ${bg}`}>{icon}</div>
          <div>
            <p className="text-gray-400 text-[10px] font-black uppercase tracking-widest">{label}</p>
            <p className={`text-2xl font-black mt-0.5 ${color}`}>{value}</p>
            {sub && <p className="text-gray-400 text-xs font-semibold mt-0.5">{sub}</p>}
          </div>
        </div>
      );
    }

    function StockBadge({ qty }) {
      const n = Number(qty);
      if (n === 0) return <span className="bg-red-100 text-red-600 text-[10px] px-2.5 py-1 rounded-full font-black">Esgotado</span>;
      if (n <= 5)  return <span className="bg-yellow-100 text-yellow-600 text-[10px] px-2.5 py-1 rounded-full font-black">Acabando</span>;
      return         <span className="bg-emerald-100 text-emerald-600 text-[10px] px-2.5 py-1 rounded-full font-black">OK</span>;
    }

    /* ── LOGIN ── */
    function LoginScreen({ onLogin }) {
      const [user, setUser] = useState("");
      const [pass, setPass] = useState("");
      const [err,  setErr]  = useState("");
      const [loading, setLoading] = useState(false);

      function handle(e) {
        e.preventDefault();
        setLoading(true);
        setTimeout(() => {
          const ok = USERS.find(u => u.user === user && u.pass === pass);
          if (ok) onLogin(user);
          else { setErr("Usuário ou senha incorretos."); setLoading(false); }
        }, 400);
      }

      return (
        <div className="min-h-screen bg-[#fdf4f7] flex items-center justify-center p-4 relative overflow-hidden">
          <div className="absolute -top-24 -left-24 w-96 h-96 bg-pink-200/40 rounded-full blur-3xl pointer-events-none" />
          <div className="absolute -bottom-24 -right-24 w-96 h-96 bg-cyan-200/40 rounded-full blur-3xl pointer-events-none" />
          <div className="absolute top-1/3 right-1/4 w-64 h-64 bg-yellow-200/30 rounded-full blur-3xl pointer-events-none" />

          <form onSubmit={handle}
            className="animate-bounceIn relative z-10 w-full max-w-sm bg-white border-2 border-pink-100 rounded-[2rem] p-8 shadow-xl">
            <div className="flex flex-col items-center mb-7">
              <img src="logo.png" alt="Bibi Papelaria"
                className="w-36 h-36 object-cover rounded-full drop-shadow-lg mb-2" />
              <p className="text-gray-400 font-bold text-xs">Acesso ao Sistema</p>
            </div>

            <div className="flex flex-col gap-4">
              <Field label="Usuário">
                <input className={inputCls} placeholder="admin" value={user} onChange={e => setUser(e.target.value)} />
              </Field>
              <Field label="Senha">
                <input type="password" className={inputCls} placeholder="••••••••" value={pass} onChange={e => setPass(e.target.value)} />
              </Field>
              {err && <p className="text-red-500 font-bold text-sm text-center bg-red-50 py-2 rounded-xl">{err}</p>}
              <button type="submit" disabled={loading}
                className="lift w-full mt-2 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-400 hover:to-purple-400 text-white font-black rounded-2xl py-4 shadow-lg text-base transition-all disabled:opacity-70">
                {loading ? "Entrando..." : "Entrar"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    /* ── DASHBOARD ── */
    function Dashboard({ produtos, vendas }) {
      const hoje = new Date().toLocaleDateString("pt-BR");
      const vendasHoje = vendas.filter(v => v.data === hoje);
      const totalHoje  = vendasHoje.reduce((s, v) => s + Number(v.total || 0), 0);
      const estoqueBaixo = produtos.filter(p => Number(p.quantidade) <= 5).length;

      return (
        <div className="flex flex-col gap-6 animate-fadeIn">
          <div>
            <h1 className="text-2xl font-black text-gray-800">Resumo de Hoje</h1>
            <p className="text-gray-400 font-bold text-sm mt-0.5">{hoje}</p>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard icon="📦" label="Produtos" value={produtos.length} color="text-purple-600" bg="bg-purple-100" />
            <StatCard icon="⚠️" label="Estoque Baixo" value={estoqueBaixo} sub="≤ 5 un." color="text-yellow-500" bg="bg-yellow-100" />
            <StatCard icon="💖" label="Vendas Hoje" value={vendasHoje.length} color="text-pink-500" bg="bg-pink-100" />
            <StatCard icon="💰" label="Faturamento" value={`R$ ${totalHoje.toFixed(2)}`} color="text-cyan-600" bg="bg-cyan-100" />
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div className="bg-white border-2 border-yellow-100 rounded-3xl p-5 shadow-sm">
              <h3 className="font-extrabold text-yellow-500 mb-4 flex items-center gap-2 text-base">Produtos Acabando</h3>
              {estoqueBaixo === 0
                ? <p className="text-gray-400 font-semibold text-sm">Estoque saudável em todos os produtos!</p>
                : <div className="flex flex-col gap-2">
                    {produtos.filter(p => Number(p.quantidade) <= 5).slice(0,6).map(p => (
                      <div key={p.codigo} className="flex justify-between items-center bg-yellow-50 px-4 py-2.5 rounded-2xl">
                        <span className="text-gray-700 font-bold text-sm truncate max-w-[65%]">{p.nome}</span>
                        <span className="bg-yellow-200 text-yellow-700 font-black text-xs px-3 py-1 rounded-full shrink-0">{p.quantidade} un.</span>
                      </div>
                    ))}
                  </div>
              }
            </div>

            <div className="bg-white border-2 border-cyan-100 rounded-3xl p-5 shadow-sm">
              <h3 className="font-extrabold text-cyan-500 mb-4 flex items-center gap-2 text-base">Últimas Vendas Hoje</h3>
              {vendasHoje.length === 0
                ? <p className="text-gray-400 font-semibold text-sm">Nenhuma venda hoje ainda.</p>
                : <div className="flex flex-col gap-2">
                    {[...vendasHoje].reverse().slice(0,5).map((v, i) => (
                      <div key={i} className="flex justify-between items-center bg-cyan-50 px-4 py-2.5 rounded-2xl">
                        <span className="text-gray-600 font-semibold text-xs truncate max-w-[60%]">{v.itens}</span>
                        <span className="text-cyan-600 font-black text-sm shrink-0">R$ {Number(v.total).toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
              }
            </div>
          </div>
        </div>
      );
    }

    /* ── PRODUTOS ── */
    function Produtos({ produtos, setProdutos, addToast, api }) {
      const [search,   setSearch]  = useState("");
      const [modal,    setModal]   = useState(false);
      const [editando, setEditando]= useState(null);
      const [form,     setForm]    = useState({ nome:"", codigo:"", preco:"", quantidade:"" });
      const [saving,   setSaving]  = useState(false);

      const f = key => e => setForm(p => ({ ...p, [key]: e.target.value }));

      function abrirNovo()  { setEditando(null); setForm({ nome:"", codigo: generateCode(), preco:"", quantidade:"" }); setModal(true); }
      function abrirEditar(p) { setEditando(p.codigo); setForm({ nome:p.nome, codigo:p.codigo, preco:p.preco, quantidade:p.quantidade }); setModal(true); }

      async function salvar() {
        if (!form.nome.trim()) return addToast("Nome é obrigatório.", "error");
        if (isNaN(Number(form.preco)) || Number(form.preco) < 0) return addToast("Preço inválido.", "error");
        setSaving(true);
        const prodData = { ...form, quantidade: form.quantidade || "0" };
        if (editando) {
          const res = await api.call("updateProduto", { produto: prodData });
          if (res.success) { setProdutos(prev => prev.map(p => p.codigo === editando ? { ...prodData } : p)); addToast("Produto atualizado!"); }
          else addToast(res.error || "Erro ao atualizar.", "error");
        } else {
          const res = await api.call("addProduto", { produto: prodData });
          if (res.success) { setProdutos(prev => [...prev, { ...prodData }]); addToast("Produto adicionado!"); }
          else addToast(res.error || "Erro ao adicionar.", "error");
        }
        setSaving(false); setModal(false);
      }

      async function excluir(codigo, nome) {
        if (!confirm(`Excluir "${nome}"?`)) return;
        const res = await api.call("deleteProduto", { codigo });
        if (res.success) { setProdutos(prev => prev.filter(p => p.codigo !== codigo)); addToast("Produto excluído."); }
        else addToast(res.error || "Erro ao excluir.", "error");
      }

      const filtrados = produtos.filter(p =>
        [p.nome, p.codigo].some(v => v?.toLowerCase().includes(search.toLowerCase()))
      );

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
            <h1 className="text-2xl font-black text-gray-800">Produtos</h1>
            <button onClick={abrirNovo}
              className="lift flex items-center gap-2 bg-pink-500 hover:bg-pink-400 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md text-sm">
              <span className="text-lg">+</span> Novo Produto
            </button>
          </div>

          <div className="relative">
            <span className="absolute left-4 top-3.5 text-gray-300 text-lg select-none">🔍</span>
            <input className="field w-full bg-white border-2 border-gray-200 rounded-2xl pl-12 pr-4 py-3 text-gray-700 placeholder-gray-300 font-semibold shadow-sm"
              placeholder="Pesquisar por nome ou código..."
              value={search} onChange={e => setSearch(e.target.value)} />
          </div>

          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-pink-50 text-pink-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Produto</th>
                    <th className="px-5 py-4">Código</th>
                    <th className="px-5 py-4 text-right">Preço</th>
                    <th className="px-5 py-4 text-right">Qtd</th>
                    <th className="px-5 py-4 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {filtrados.length === 0
                    ? <tr><td colSpan="5" className="text-center py-12 text-gray-300 font-bold">Nenhum produto encontrado</td></tr>
                    : filtrados.map(p => (
                        <tr key={p.codigo} className="border-t border-gray-50 hover:bg-pink-50/40 transition-colors">
                          <td className="px-5 py-3.5 font-bold text-gray-800 max-w-[180px] truncate">{p.nome}</td>
                          <td className="px-5 py-3.5 text-gray-400 text-xs font-mono">{p.codigo}</td>
                          <td className="px-5 py-3.5 text-right text-cyan-600 font-black">R$ {Number(p.preco).toFixed(2)}</td>
                          <td className={`px-5 py-3.5 text-right font-black ${Number(p.quantidade)<=5?"text-yellow-500":"text-gray-700"}`}>{p.quantidade}</td>
                          <td className="px-5 py-3.5">
                            <div className="flex justify-center gap-1.5">
                              <button onClick={() => abrirEditar(p)} title="Editar"
                                className="w-8 h-8 rounded-full bg-cyan-50 text-cyan-500 hover:bg-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors">✏️</button>
                              <button onClick={() => excluir(p.codigo, p.nome)} title="Excluir"
                                className="w-8 h-8 rounded-full bg-red-50 text-red-400 hover:bg-red-500 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                            </div>
                          </td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>

          <Modal open={modal} onClose={() => setModal(false)} title={editando ? "Editar Produto" : "Novo Produto"}>
            <div className="flex flex-col gap-4">
              <Field label="Nome do Produto">
                <input className={inputCls} placeholder="Ex: Caderno Universitário" value={form.nome} onChange={f("nome")} />
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Preço (R$)">
                  <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={form.preco} onChange={f("preco")} />
                </Field>
                <Field label="Quantidade">
                  <input type="number" min="0" className={inputCls} placeholder="0" value={form.quantidade} onChange={f("quantidade")} />
                </Field>
              </div>
              <div className="bg-gray-50 rounded-xl p-3">
                <p className="text-gray-400 text-xs font-bold">Código (gerado automaticamente)</p>
                <p className="text-gray-700 font-mono font-black text-lg mt-1">{form.codigo}</p>
              </div>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={() => setModal(false)}
                className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 transition-colors text-sm">Cancelar</button>
              <button onClick={salvar} disabled={saving}
                className="flex-1 lift bg-pink-500 hover:bg-pink-400 text-white font-black rounded-2xl py-3 shadow-md transition-all text-sm disabled:opacity-60">
                {saving ? "Salvando..." : "Salvar"}
              </button>
            </div>
          </Modal>
        </div>
      );
    }

    /* ── VENDA INLINE (modal flutuante) ── */
    function VendaInline({ produtos, setProdutos, setVendas, addToast, api, carrinho, setCarrinho, onVendaFinalizada }) {
      const [search,      setSearch]     = useState("");
      const [pagamento,   setPagamento]  = useState("dinheiro");
      const [desconto,    setDesconto]   = useState("");
      const [finalizando, setFinalizando]= useState(false);
      const [modoAvulso,  setModoAvulso] = useState(false);
      const [avulsoForm,  setAvulsoForm] = useState({ nome: "", qtd: "1", preco: "" });
      const searchRef = useRef();

      const resultado = search
        ? produtos.filter(p => Number(p.quantidade) > 0 && [p.nome, p.codigo].some(v => v?.toLowerCase().includes(search.toLowerCase()))).slice(0, 6)
        : [];

      function addAoCarrinho(p) {
        setCarrinho(prev => {
          const ex = prev.find(i => i.codigo === p.codigo);
          if (ex) {
            const prod = produtos.find(pr => pr.codigo === p.codigo);
            if (ex.qtd >= Number(prod?.quantidade || 0)) { addToast("Estoque insuficiente.", "warn"); return prev; }
            return prev.map(i => i.codigo === p.codigo ? { ...i, qtd: i.qtd + 1 } : i);
          }
          return [...prev, { ...p, qtd: 1 }];
        });
        setSearch(""); searchRef.current?.focus();
      }

      function addAvulso() {
        if (!avulsoForm.nome.trim() || !avulsoForm.preco) return addToast("Preencha nome e preço.", "error");
        setCarrinho(prev => [...prev, { id: Date.now(), nome: avulsoForm.nome, preco: avulsoForm.preco, qtd: Number(avulsoForm.qtd) || 1, isAvulso: true }]);
        setAvulsoForm({ nome: "", qtd: "1", preco: "" });
      }

      function alterarQtd(key, delta) {
        setCarrinho(prev => prev.map(i => {
          if (i.codigo !== key && i.id !== key) return i;
          const nova = i.qtd + delta;
          if (nova < 1) return i;
          if (!i.isAvulso) {
            const prod = produtos.find(p => p.codigo === key);
            if (nova > Number(prod?.quantidade || 0)) { addToast("Estoque insuficiente.", "warn"); return i; }
          }
          return { ...i, qtd: nova };
        }));
      }

      const subtotal = carrinho.reduce((s, i) => s + Number(i.preco) * i.qtd, 0);
      const descVal  = Math.min(subtotal, Math.max(0, parseFloat(desconto) || 0));
      const total    = subtotal - descVal;

      async function finalizar() {
        if (carrinho.length === 0) return addToast("Carrinho vazio.", "error");
        setFinalizando(true);
        const venda = {
          data: new Date().toLocaleDateString("pt-BR"),
          hora: new Date().toLocaleTimeString("pt-BR"),
          itens: carrinho.map(i => `${i.nome}(${i.qtd})`).join(", "),
          subtotal: subtotal.toFixed(2),
          desconto: descVal.toFixed(2),
          total: total.toFixed(2),
          pagamento,
        };
        const res = await api.call("registrarVenda", { venda, carrinho });
        if (res.success) {
          setProdutos(prev => prev.map(p => {
            const item = carrinho.find(i => i.codigo === p.codigo);
            return item ? { ...p, quantidade: String(Number(p.quantidade) - item.qtd) } : p;
          }));
          setVendas(v => [...v, venda]);
          setCarrinho([]); setDesconto("");
          addToast("Venda finalizada com sucesso! ✨");
          if (onVendaFinalizada) onVendaFinalizada();
        } else addToast(res.error || "Erro ao finalizar venda.", "error");
        setFinalizando(false);
      }

      return (
        <div className="flex flex-col gap-4">
          {/* Modo toggle */}
          <div className="flex gap-2">
            <button onClick={() => setModoAvulso(false)}
              className={`flex-1 py-2.5 rounded-2xl font-bold text-sm transition-all ${!modoAvulso ? "bg-pink-500 text-white shadow-md" : "bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>
              📦 Venda Normal
            </button>
            <button onClick={() => setModoAvulso(true)}
              className={`flex-1 py-2.5 rounded-2xl font-bold text-sm transition-all ${modoAvulso ? "bg-purple-500 text-white shadow-md" : "bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>

            </button>

          {/* Busca / Avulso */}

              <input type="number" step="0.01" min="0" className={`${inputCls} w-28 text-center`} placeholder="R$ Preço"
                value={avulsoForm.preco} onChange={e => setAvulsoForm(f => ({...f, preco: e.target.value}))} />
              <button onClick={addAvulso} className="lift bg-purple-500 hover:bg-purple-400 text-white font-black px-6 py-2.5 rounded-2xl shadow-md w-full sm:w-auto">

              {resultado.length > 0 && (

                  {resultado.map(p => (
                    <button key={p.codigo} onClick={() => addAoCarrinho(p)}
                      className="w-full flex justify-between items-center px-5 py-3 hover:bg-pink-50 transition-colors border-b border-gray-50 last:border-0 text-left">
                      <div>
                        <p className="text-gray-800 font-bold text-sm">{p.nome}</p>
                        <p className="text-gray-400 text-xs font-mono">{p.codigo} · {p.quantidade} em estoque</p>
                      </div>
                      <span className="text-cyan-600 font-black shrink-0 ml-4">R$ {Number(p.preco).toFixed(2)}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Carrinho */}
          <div className="bg-gray-50 rounded-2xl border border-gray-100 max-h-48 overflow-y-auto">
            {carrinho.length === 0
              ? <div className="flex flex-col items-center justify-center gap-1 py-8 text-gray-300">
                  <span className="text-3xl">🛍️</span>
                  <p className="font-bold text-sm">Carrinho vazio</p>
                </div>
              : <div className="flex flex-col divide-y divide-gray-100">
                  {carrinho.map(i => (
                    <div key={i.codigo || i.id} className="flex items-center gap-3 px-4 py-2.5">
                      <div className="flex-1 min-w-0">
                        <p className="text-gray-800 font-bold text-xs truncate">{i.nome} {i.isAvulso && <span className="text-purple-400">(Avulso)</span>}</p>
                        <p className="text-gray-400 text-[10px]">R$ {Number(i.preco).toFixed(2)} un.</p>
                      </div>
                      <div className="flex items-center gap-1.5 shrink-0">
                        <button onClick={() => alterarQtd(i.codigo || i.id, -1)}

                        <span className="text-gray-800 font-black text-sm w-5 text-center">{i.qtd}</span>

                      <button onClick={() => setCarrinho(c => c.filter(x => (x.codigo || x.id) !== (i.codigo || i.id)))}

          </div>

          {/* Pagamento, desconto, total e finalizar */}
          <div className="flex flex-col gap-3">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-pink-600 font-bold text-xs block mb-1 ml-1">Pagamento</label>

            <div className="flex items-center justify-between bg-emerald-50 border-2 border-emerald-100 px-5 py-3 rounded-2xl">

              {finalizando

              }
            </button>
          </div>
        </div>
      );

    /* ── ESTOQUE ── */
    function Estoque({ produtos, setProdutos, addToast, api }) {
      const [codigo,  setCodigo]  = useState("");
      const [qtd,     setQtd]     = useState("");
      const [loading, setLoading] = useState(false);
      const [filtro,  setFiltro]  = useState("todos");

      async function repor() {
        if (!codigo.trim() || !qtd) return addToast("Informe o código e a quantidade.", "error");
        const prod = produtos.find(p => p.codigo === codigo.trim());
        if (!prod) return addToast("Produto não encontrado.", "error");
        if (isNaN(Number(qtd)) || Number(qtd) <= 0) return addToast("Quantidade inválida.", "error");
        setLoading(true);
        const novaQtd = String(Number(prod.quantidade) + Number(qtd));
        const res = await api.call("updateProduto", { produto: { ...prod, quantidade: novaQtd } });
        if (res.success) {
          setProdutos(prev => prev.map(p => p.codigo === codigo.trim() ? { ...p, quantidade: novaQtd } : p));
          addToast(`"${prod.nome}" reabastecido!`);
          setCodigo(""); setQtd("");
        } else addToast(res.error || "Erro ao atualizar.", "error");
        setLoading(false);
      }

      const filtrados = produtos.filter(p => {
        if (filtro === "ok")     return Number(p.quantidade) > 5;
        if (filtro === "baixo")  return Number(p.quantidade) > 0 && Number(p.quantidade) <= 5;
        if (filtro === "zero")   return Number(p.quantidade) === 0;
        return true;
      });

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <h1 className="text-2xl font-black text-gray-800">Controle de Estoque</h1>

          <div className="bg-white border-2 border-purple-100 rounded-3xl p-5 shadow-sm">
            <p className="text-purple-500 font-extrabold mb-3 text-sm">Entrada Rápida de Estoque</p>
            <div className="flex flex-wrap gap-3">
              <input className={`${inputCls} flex-1 min-w-[200px]`}
                placeholder="Código do produto" list="prod-list"
                value={codigo} onChange={e => setCodigo(e.target.value)} />
              <datalist id="prod-list">
                {produtos.map(p => <option key={p.codigo} value={p.codigo}>{p.nome}</option>)}
              </datalist>
              <input type="number" min="1" className={`${inputCls} w-28 text-center`}
                placeholder="+ Qtd" value={qtd} onChange={e => setQtd(e.target.value)} />
              <button onClick={repor} disabled={loading}
                className="lift bg-purple-500 hover:bg-purple-400 text-white font-black px-7 py-2.5 rounded-2xl shadow-md transition-all text-sm disabled:opacity-60">
                {loading ? "..." : "Repor"}
              </button>
            </div>
          </div>

          <div className="flex gap-2 flex-wrap">
            {[["todos","Todos","bg-gray-100 text-gray-600"],["ok","OK","bg-emerald-100 text-emerald-600"],["baixo","Acabando","bg-yellow-100 text-yellow-600"],["zero","Esgotado","bg-red-100 text-red-500"]].map(([v,l,cls]) => (
              <button key={v} onClick={() => setFiltro(v)}
                className={`px-4 py-2 rounded-full text-xs font-black transition-all ${filtro===v ? cls+" ring-2 ring-offset-1 ring-current" : "bg-gray-100 text-gray-400 hover:bg-gray-200"}`}>
                {l}
              </button>

          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-purple-50 text-purple-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Produto</th>
                    <th className="px-5 py-4">Código</th>
                    <th className="px-5 py-4 text-center">Quantidade</th>
                    <th className="px-5 py-4 text-center">Status</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {filtrados.length === 0
                    ? <tr><td colSpan="4" className="text-center py-12 text-gray-300 font-bold">Nenhum produto nessa categoria.</td></tr>
                    : filtrados.map(p => (
                        <tr key={p.codigo} className="border-t border-gray-50 hover:bg-purple-50/30 transition-colors">
                          <td className="px-5 py-3.5 font-bold text-gray-800">{p.nome}</td>
                          <td className="px-5 py-3.5 text-gray-400 text-xs font-mono">{p.codigo}</td>
                          <td className={`px-5 py-3.5 text-center font-black text-lg ${Number(p.quantidade)<=5?"text-yellow-500":"text-gray-700"}`}>{p.quantidade}</td>
                          <td className="px-5 py-3.5 text-center"><StockBadge qty={p.quantidade} /></td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ── SAÍDAS DE CAIXA ── */
    function SaidasCaixa({ saidas, setSaidas, addToast, api }) {
      const [valor, setValor] = useState("");
      const [motivo, setMotivo] = useState("");
      const [loading, setLoading] = useState(false);

      async function registrar() {
        if (!valor || isNaN(Number(valor)) || Number(valor) <= 0) return addToast("Informe um valor válido.", "error");
        if (!motivo.trim()) return addToast("Informe o motivo.", "error");
        setLoading(true);
        const saida = {
          data: new Date().toLocaleDateString("pt-BR"),
          hora: new Date().toLocaleTimeString("pt-BR"),
          valor: Number(valor).toFixed(2),
          motivo: motivo.trim(),
        };
        const res = await api.call("addSaidaCaixa", { saida });
        if (res.success) {
          setSaidas(prev => [...prev, saida]);
          addToast("Saída registrada!");
          setValor(""); setMotivo("");
        } else addToast(res.error || "Erro ao registrar.", "error");
        setLoading(false);
      }

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <h1 className="text-2xl font-black text-gray-800">Saídas de Caixa</h1>

          <div className="bg-white border-2 border-red-100 rounded-3xl p-5 shadow-sm">
            <p className="text-red-500 font-extrabold mb-3 text-sm">Registrar Nova Saída</p>
            <div className="flex flex-col gap-3">
              <div className="grid grid-cols-2 gap-3">
                <Field label="Valor (R$)">
                  <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={valor} onChange={e => setValor(e.target.value)} />
                </Field>
                <Field label="Motivo">
                  <input className={inputCls} placeholder="Ex: Pagamento fornecedor" value={motivo} onChange={e => setMotivo(e.target.value)} />
                </Field>
              </div>
              <button onClick={registrar} disabled={loading}
                className="lift bg-red-500 hover:bg-red-400 text-white font-black rounded-2xl py-3 shadow-md transition-all text-sm disabled:opacity-60">
                {loading ? "Registrando..." : "Registrar Saída"}
              </button>
            </div>
          </div>

          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-red-50 text-red-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Data / Hora</th>
                    <th className="px-5 py-4">Motivo</th>
                    <th className="px-5 py-4 text-right">Valor</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {saidas.length === 0
                    ? <tr><td colSpan="3" className="text-center py-12 text-gray-300 font-bold">Nenhuma saída registrada.</td></tr>
                    : [...saidas].reverse().map((s, i) => (
                        <tr key={i} className="border-t border-gray-50 hover:bg-red-50/30 transition-colors">
                          <td className="px-5 py-3.5">
                            <p className="font-bold text-gray-800">{s.data}</p>
                            <p className="text-gray-400 text-xs">{s.hora}</p>
                          </td>
                          <td className="px-5 py-3.5 text-gray-600 font-semibold">{s.motivo}</td>
                          <td className="px-5 py-3.5 text-right text-red-500 font-black">- R$ {Number(s.valor).toFixed(2)}</td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ── HISTÓRICO (RELATÓRIO FINAL) ── */
    function Historico({ vendas, saidas, valorCaixa, caixaAberto, onFecharCaixa, setVendas, api, addToast }) {
      const [filtroData, setFiltroData] = useState("");
      const [filtroPag,  setFiltroPag]  = useState("todos");
      const [confirmando, setConfirmando] = useState(false);
      const [modalEdicao, setModalEdicao] = useState(null); // { venda, indexOriginal }
      const [editForm, setEditForm] = useState({});
      const [salvando, setSalvando] = useState(false);

      const filtradas = [...vendas].reverse().filter(v => {
        const okData = filtroData ? v.data === new Date(filtroData+"T00:00:00").toLocaleDateString("pt-BR") : true;
        const okPag  = filtroPag !== "todos" ? v.pagamento === filtroPag : true;
        return okData && okPag;
      });

      // Totais por forma de pagamento (sobre TODAS as vendas do dia, independente do filtro)
      const todasVendas = [...vendas];
      const totalDinheiro = todasVendas.filter(v => (v.pagamento||"").toLowerCase() === "dinheiro").reduce((s,v) => s + Number(v.total||0), 0);
      const totalPix      = todasVendas.filter(v => (v.pagamento||"").toLowerCase() === "pix").reduce((s,v) => s + Number(v.total||0), 0);
      const totalDebito   = todasVendas.filter(v => (v.pagamento||"").toLowerCase() === "debito").reduce((s,v) => s + Number(v.total||0), 0);
      const totalCredito  = todasVendas.filter(v => (v.pagamento||"").toLowerCase() === "credito").reduce((s,v) => s + Number(v.total||0), 0);

      const totalVendas = filtradas.reduce((s,v) => s + Number(v.total||0), 0);
      const totalSaidas = saidas.reduce((s, v) => s + Number(v.valor||0), 0);
      const totalVendasGeral = todasVendas.reduce((s,v) => s + Number(v.total||0), 0);
      const saldoFinal = (caixaAberto ? Number(valorCaixa||0) : 0) + totalVendasGeral - totalSaidas;

      // Encontra o índice real (posição na array original de vendas) de uma venda filtrada
      function indexOriginal(venda) {
        return vendas.findIndex(v => v.data === venda.data && v.hora === venda.hora && v.itens === venda.itens);
      }

      function abrirEdicao(venda) {
        const idx = indexOriginal(venda);
        setEditForm({
          pagamento: venda.pagamento || "dinheiro",
          desconto:  venda.desconto  || "0",
          subtotal:  venda.subtotal  || "0",
          total:     venda.total     || "0",
        });
        setModalEdicao({ venda, idx });
      }

      async function salvarEdicao() {
        if (!modalEdicao) return;
        setSalvando(true);
        const novoTotal = (parseFloat(editForm.subtotal || 0) - parseFloat(editForm.desconto || 0)).toFixed(2);
        const vendaAtualizada = {
          ...modalEdicao.venda,
          pagamento: editForm.pagamento,
          desconto:  parseFloat(editForm.desconto || 0).toFixed(2),
          subtotal:  parseFloat(editForm.subtotal || 0).toFixed(2),
          total:     novoTotal,
        };
        const res = await api.call("updateVenda", { index: modalEdicao.idx, venda: vendaAtualizada });
        if (res.success) {
          setVendas(prev => prev.map((v, i) => i === modalEdicao.idx ? vendaAtualizada : v));
          addToast("Venda atualizada com sucesso!");
          setModalEdicao(null);
        } else {
          addToast(res.error || "Erro ao salvar.", "error");
        }
        setSalvando(false);
      }

      async function cancelarVenda(venda) {
        const idx = indexOriginal(venda);
        if (idx === -1) return addToast("Venda não encontrada.", "error");
        if (!confirm(`Cancelar a venda de R$ ${Number(venda.total).toFixed(2)} (${venda.itens})?\n\nEssa ação remove o registro permanentemente.`)) return;
        const res = await api.call("deleteVenda", { index: idx });
        if (res.success) {
          setVendas(prev => prev.filter((_, i) => i !== idx));
          addToast("Venda cancelada e removida.", "warn");
        } else {
          addToast(res.error || "Erro ao cancelar.", "error");
        }
      }

      function gerarEImprimirPDF() {
        // Agrupa todas as vendas por forma de pagamento para o PDF
        const grouped = { dinheiro: [], pix: [], debito: [], credito: [] };
        todasVendas.forEach(v => {
          const pag = (v.pagamento || "").toLowerCase();
          if (grouped[pag]) grouped[pag].push(v);
        });

        const labelPag = { dinheiro: "💵 Dinheiro", pix: "📱 PIX", debito: "💳 Débito", credito: "💳 Crédito" };
        const totalPorPag = {
          dinheiro: totalDinheiro,
          pix:      totalPix,
          debito:   totalDebito,
          credito:  totalCredito,
        };

        // Monta colunas 2x para cada grupo de pagamento
        function renderGrupo(pag) {
          const lista = grouped[pag];
          if (lista.length === 0) return "";
          const tot = totalPorPag[pag];
          const rows = lista.map(v => `
            <tr>
              <td>${v.hora || ""}</td>
              <td class="itens">${v.itens || ""}</td>
              ${Number(v.desconto||0) > 0 ? `<td class="val red">-${Number(v.desconto).toFixed(2)}</td>` : `<td class="val gray">-</td>`}
              <td class="val"><strong>${Number(v.total||0).toFixed(2)}</strong></td>
            </tr>
          `).join("");

          return `
            <div class="grupo">
              <div class="grupo-header">${labelPag[pag]} <span class="grupo-total">Total: R$ ${tot.toFixed(2)}</span></div>
              <table>
                <thead><tr><th>Hora</th><th>Itens</th><th>Desc.</th><th>R$</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          `;
        }

        const saidas_rows = saidas.length === 0
          ? `<tr><td colspan="3" style="color:#aaa;text-align:center">Nenhuma saída</td></tr>`
          : saidas.map(s => `
              <tr>
                <td>${s.hora || s.data || ""}</td>
                <td class="itens">${s.motivo || ""}</td>
                <td class="val red"><strong>${Number(s.valor||0).toFixed(2)}</strong></td>
              </tr>
            `).join("");

        const printWindow = window.open("", "_blank");
        printWindow.document.write(`
          <html>
            <head>
              <title>Fechamento de Caixa – Bibi Papelaria</title>
              <style>
                @page { size: A4; margin: 10mm 10mm 12mm 10mm; }
                * { box-sizing: border-box; margin: 0; padding: 0; }
                body { font-family: Arial, sans-serif; font-size: 7.5pt; color: #222; background: #fff; }

                .topo { text-align: center; border-bottom: 2px solid #ec4899; padding-bottom: 4px; margin-bottom: 6px; }
                .topo h1 { font-size: 13pt; color: #ec4899; font-weight: 900; letter-spacing: 0.5px; }
                .topo p  { font-size: 7pt; color: #888; margin-top: 1px; }

                /* Layout 2 colunas para os grupos de pagamento */
                .colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }

                .grupo { border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; break-inside: avoid; }
                .grupo-header { background: #f0f9ff; color: #0891b2; font-weight: 900; font-size: 7.5pt;
                                padding: 3px 6px; display: flex; justify-content: space-between; align-items: center; }
                .grupo-total  { background: #0891b2; color: #fff; font-size: 7pt; padding: 1px 6px; border-radius: 10px; }

                table { width: 100%; border-collapse: collapse; }
                thead tr { background: #f9fafb; }
                th { font-size: 6.5pt; font-weight: 700; color: #6b7280; text-transform: uppercase;
                     padding: 2px 4px; border-bottom: 1px solid #e5e7eb; text-align: left; }
                td { font-size: 7pt; padding: 2px 4px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
                tr:last-child td { border-bottom: none; }
                .itens { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; }
                .val { text-align: right; white-space: nowrap; }
                .red { color: #ef4444; }
                .gray { color: #d1d5db; }

                /* Seção saídas */
                .saidas-wrap { margin-bottom: 6px; break-inside: avoid; }
                .saidas-header { background: #fff1f2; color: #ef4444; font-weight: 900; font-size: 7.5pt;
                                 padding: 3px 6px; border: 1px solid #fecdd3; border-radius: 4px 4px 0 0; }
                .saidas-wrap table { border: 1px solid #fecdd3; border-top: none; border-radius: 0 0 4px 4px; overflow: hidden; }

                /* Totalizador final */
                .fechamento { border: 2px solid #374151; border-radius: 6px; padding: 8px 10px; margin-top: 4px;
                               break-inside: avoid; }
                .fechamento h2 { font-size: 9pt; font-weight: 900; color: #111; text-align: center;
                                  border-bottom: 1px solid #d1d5db; padding-bottom: 4px; margin-bottom: 6px; }
                .fech-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px; }
                .fech-box { border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px 6px; text-align: center; }
                .fech-box .lbl { font-size: 6pt; font-weight: 700; text-transform: uppercase; color: #9ca3af; }
                .fech-box .val { font-size: 10pt; font-weight: 900; margin-top: 2px; }
                .fech-box.verde .val  { color: #059669; }
                .fech-box.azul .val   { color: #0891b2; }
                .fech-box.vermelho .val { color: #ef4444; }
                .fech-box.roxo .val   { color: #7c3aed; }

                .pag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
                .pag-box  { border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px 6px; text-align: center; background: #f9fafb; }
                .pag-box .lbl { font-size: 6pt; font-weight: 700; color: #6b7280; text-transform: uppercase; }
                .pag-box .val { font-size: 9pt; font-weight: 900; color: #374151; margin-top: 1px; }

                .assinaturas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 14px; }
                .ass-line { border-top: 1px solid #374151; padding-top: 3px; font-size: 6.5pt; text-align: center; color: #555; }
              </style>
            </head>
            <body>
              <div class="topo">
                <h1>Bibi Papelaria — Fechamento de Caixa</h1>
                <p>Gerado em: ${new Date().toLocaleString("pt-BR")} &nbsp;|&nbsp; Operador: admin</p>
              </div>

              <div class="colunas">
                ${renderGrupo("dinheiro")}
                ${renderGrupo("pix")}
                ${renderGrupo("debito")}
                ${renderGrupo("credito")}
              </div>

              <div class="saidas-wrap">
                <div class="saidas-header">💸 Saídas de Caixa — Total: R$ ${totalSaidas.toFixed(2)}</div>
                <table>
                  <thead><tr><th>Hora</th><th>Motivo</th><th>R$</th></tr></thead>
                  <tbody>${saidas_rows}</tbody>
                </table>
              </div>

              <div class="fechamento">
                <h2>✦ RESUMO FINAL DO CAIXA ✦</h2>
                <div class="fech-grid">
                  <div class="fech-box verde">
                    <div class="lbl">Caixa Inicial</div>
                    <div class="val">R$ ${Number(valorCaixa||0).toFixed(2)}</div>
                  </div>
