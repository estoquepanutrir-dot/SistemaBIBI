                    <div class="lbl">Total Vendas</div>
                    <div class="val">R$ ${totalVendasGeral.toFixed(2)}</div>
                  </div>
                  <div class="fech-box vermelho">
                    <div class="lbl">Total Saídas</div>
                    <div class="val">- R$ ${totalSaidas.toFixed(2)}</div>
                  </div>
                  <div class="fech-box roxo">
                    <div class="lbl">Saldo Final</div>
                    <div class="val">R$ ${saldoFinal.toFixed(2)}</div>
                  </div>
                </div>

                <div class="pag-grid">
                  <div class="pag-box">
                    <div class="lbl">💵 Dinheiro</div>
                    <div class="val">R$ ${totalDinheiro.toFixed(2)}</div>
                  </div>
                  <div class="pag-box">
                    <div class="lbl">📱 PIX</div>
                    <div class="val">R$ ${totalPix.toFixed(2)}</div>
                  </div>
                  <div class="pag-box">
                    <div class="lbl">💳 Débito</div>
                    <div class="val">R$ ${totalDebito.toFixed(2)}</div>
                  </div>
                  <div class="pag-box">
                    <div class="lbl">💳 Crédito</div>
                    <div class="val">R$ ${totalCredito.toFixed(2)}</div>
                  </div>
                </div>

                <div class="assinaturas">
                  <div class="ass-line">Operador(a)</div>
                  <div class="ass-line">Responsável / Gerente</div>
                </div>
              </div>

              <script>window.onload = function() { window.print(); };<\/script>
            </body>
          </html>
        `);
        printWindow.document.close();
      }

      function handleFecharCaixa() {
        if (!confirmando) { setConfirmando(true); return; }
        gerarEImprimirPDF();
        if (onFecharCaixa) onFecharCaixa();
        setConfirmando(false);
      }

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <h1 className="text-2xl font-black text-gray-800">Relatório Final</h1>
            <div className="flex items-center gap-2">
              {confirmando && (
                <span className="text-red-500 font-bold text-sm bg-red-50 border border-red-200 px-3 py-2 rounded-xl">
                  Confirmar fechamento?
                </span>
              )}
              {confirmando && (
                <button onClick={() => setConfirmando(false)}
                  className="px-4 py-2 rounded-xl font-bold text-sm bg-gray-100 text-gray-500 hover:bg-gray-200">
                  Cancelar
                </button>
              )}
              <button onClick={handleFecharCaixa}
                className={`lift flex items-center gap-2 px-5 py-2.5 rounded-2xl font-bold shadow-md text-sm text-white transition-all ${confirmando ? "bg-red-500 hover:bg-red-600 animate-pulse" : "bg-red-500 hover:bg-red-400"}`}>
                🔒 {confirmando ? "Sim, Fechar e Imprimir" : "Fechar Caixa"}
              </button>
            </div>
          </div>

          {/* Resumo do Caixa */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div className="bg-white border-2 border-emerald-100 rounded-3xl p-5 shadow-sm">
              <p className="text-gray-400 text-[10px] font-black uppercase">Valor Inicial</p>
              <p className="text-xl font-black text-emerald-600 mt-1">R$ {Number(valorCaixa||0).toFixed(2)}</p>
            </div>
            <div className="bg-white border-2 border-cyan-100 rounded-3xl p-5 shadow-sm">
              <p className="text-gray-400 text-[10px] font-black uppercase">Total Vendas</p>
              <p className="text-xl font-black text-cyan-600 mt-1">R$ {totalVendasGeral.toFixed(2)}</p>
            </div>
            <div className="bg-white border-2 border-red-100 rounded-3xl p-5 shadow-sm">
              <p className="text-gray-400 text-[10px] font-black uppercase">Total Saídas</p>
              <p className="text-xl font-black text-red-500 mt-1">- R$ {totalSaidas.toFixed(2)}</p>
            </div>
            <div className="bg-white border-2 border-purple-100 rounded-3xl p-5 shadow-sm">
              <p className="text-gray-400 text-[10px] font-black uppercase">Saldo Final</p>
              <p className="text-xl font-black text-purple-600 mt-1">R$ {saldoFinal.toFixed(2)}</p>
            </div>
          </div>

          {/* Totais por forma de pagamento */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
            {[
              { label: "💵 Dinheiro", val: totalDinheiro, border: "border-green-100", color: "text-green-600" },
              { label: "📱 PIX",      val: totalPix,      border: "border-sky-100",   color: "text-sky-600"   },
              { label: "💳 Débito",   val: totalDebito,   border: "border-blue-100",  color: "text-blue-600"  },
              { label: "💳 Crédito",  val: totalCredito,  border: "border-indigo-100",color: "text-indigo-600"},
            ].map(item => (
              <div key={item.label} className={`bg-white border-2 ${item.border} rounded-2xl px-4 py-3 shadow-sm flex justify-between items-center`}>
                <span className="text-gray-500 font-bold text-xs">{item.label}</span>
                <span className={`font-black text-base ${item.color}`}>R$ {item.val.toFixed(2)}</span>
              </div>
            ))}
          </div>

          {/* Filtros Vendas */}
          <div className="bg-white border-2 border-cyan-100 rounded-3xl p-4 shadow-sm flex flex-wrap gap-3 items-end">
            <div>
              <label className="text-gray-400 font-bold text-xs block mb-1 ml-1">Data</label>
              <input type="date" className={`${inputCls} w-44`} value={filtroData} onChange={e => setFiltroData(e.target.value)} />
            </div>
            <div>
              <label className="text-gray-400 font-bold text-xs block mb-1 ml-1">Pagamento</label>
              <select className={`${inputCls} w-36`} value={filtroPag} onChange={e => setFiltroPag(e.target.value)}>
                <option value="todos">Todos</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="pix">PIX</option>
                <option value="debito">Débito</option>
                <option value="credito">Crédito</option>
              </select>
            </div>
          </div>

          {/* Vendas */}
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="px-5 py-3 bg-cyan-50 border-b border-cyan-100 flex justify-between items-center">
              <h3 className="font-extrabold text-cyan-600 text-sm">Vendas Realizadas</h3>
              <span className="text-xs text-gray-400 font-bold">{filtradas.length} registro(s)</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-gray-50 text-gray-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Data / Hora</th>
                    <th className="px-5 py-4">Itens</th>
                    <th className="px-5 py-4 text-center">Desconto</th>
                    <th className="px-5 py-4 text-center">Pagamento</th>
                    <th className="px-5 py-4 text-right">Total</th>
                    <th className="px-4 py-4 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {filtradas.length === 0
                    ? <tr><td colSpan="6" className="text-center py-12 text-gray-300 font-bold">Nenhuma venda encontrada.</td></tr>
                    : filtradas.map((v, i) => (
                        <tr key={i} className="border-t border-gray-50 hover:bg-cyan-50/30 transition-colors">
                          <td className="px-5 py-3.5">
                            <p className="font-bold text-gray-800">{v.data || ""}</p>
                            <p className="text-gray-400 text-xs">{v.hora || ""}</p>
                          </td>
                          <td className="px-5 py-3.5 text-gray-500 text-xs max-w-[180px] truncate" title={v.itens}>{v.itens || ""}</td>
                          <td className="px-5 py-3.5 text-center">
                            {Number(v.desconto||0) > 0
                              ? <span className="text-purple-500 font-black text-xs">- R$ {Number(v.desconto).toFixed(2)}</span>
                              : <span className="text-gray-300 text-xs">—</span>
                            }
                          </td>
                          <td className="px-5 py-3.5 text-center">
                            <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold uppercase ${
                              (v.pagamento||"").toLowerCase() === "dinheiro" ? "bg-green-100 text-green-700" :
                              (v.pagamento||"").toLowerCase() === "pix"      ? "bg-sky-100 text-sky-700"   :
                              (v.pagamento||"").toLowerCase() === "debito"   ? "bg-blue-100 text-blue-700"  :
                              (v.pagamento||"").toLowerCase() === "credito"  ? "bg-indigo-100 text-indigo-700" :
                              "bg-gray-100 text-gray-600"
                            }`}>{v.pagamento || ""}</span>
                          </td>
                          <td className="px-5 py-3.5 text-right text-cyan-600 font-black">R$ {Number(v.total||0).toFixed(2)}</td>
                          <td className="px-4 py-3.5">
                            <div className="flex justify-center gap-1.5">
                              <button onClick={() => abrirEdicao(v)} title="Editar pagamento / desconto"
                                className="w-8 h-8 rounded-full bg-cyan-50 hover:bg-cyan-500 text-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors" >✏️</button>
                              <button onClick={() => cancelarVenda(v)} title="Cancelar / excluir venda"
                                className="w-8 h-8 rounded-full bg-red-50 hover:bg-red-500 text-red-400 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                            </div>
                          </td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal edição de venda */}
          {modalEdicao && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
                 onClick={e => e.target === e.currentTarget && setModalEdicao(null)}>
              <div className="animate-bounceIn bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
                <div className="flex items-center justify-between mb-5">
                  <h2 className="text-xl font-black text-cyan-500">Editar Venda</h2>
                  <button onClick={() => setModalEdicao(null)}
                    className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:bg-gray-200 font-bold text-xl">✕</button>
                </div>

                {/* Info da venda (readonly) */}
                <div className="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-4">
                  <p className="text-gray-400 text-[10px] font-black uppercase mb-1">Itens da venda</p>
                  <p className="text-gray-700 font-bold text-sm leading-snug">{modalEdicao.venda.itens}</p>
                  <p className="text-gray-400 text-xs mt-1">{modalEdicao.venda.data} às {modalEdicao.venda.hora}</p>
                </div>

                <div className="flex flex-col gap-4">
                  <div>
                    <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">Forma de Pagamento</label>
                    <select className={`${inputCls} w-full`} value={editForm.pagamento}
                      onChange={e => setEditForm(f => ({...f, pagamento: e.target.value}))}>
                      <option value="dinheiro">💵 Dinheiro</option>
                      <option value="pix">📱 PIX</option>
                      <option value="debito">💳 Débito</option>
                      <option value="credito">💳 Crédito</option>
                    </select>
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">Subtotal (R$)</label>
                      <input type="number" step="0.01" min="0" className={inputCls}
                        value={editForm.subtotal}
                        onChange={e => setEditForm(f => ({...f, subtotal: e.target.value}))} />
                    </div>
                    <div>
                      <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">Desconto (R$)</label>
                      <input type="number" step="0.01" min="0" className={inputCls}
                        value={editForm.desconto}
                        onChange={e => setEditForm(f => ({...f, desconto: e.target.value}))} />
                    </div>
                  </div>

                  {/* Total calculado */}
                  <div className="flex items-center justify-between bg-cyan-50 border-2 border-cyan-100 px-5 py-3 rounded-2xl">
                    <span className="text-gray-600 font-bold text-sm">Total calculado</span>
                    <span className="text-2xl font-black text-cyan-500">
                      R$ {Math.max(0, (parseFloat(editForm.subtotal||0) - parseFloat(editForm.desconto||0))).toFixed(2)}
                    </span>
                  </div>
                </div>

                <div className="flex gap-3 mt-5">
                  <button onClick={() => setModalEdicao(null)}
                    className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 transition-colors text-sm">
                    Cancelar
                  </button>
                  <button onClick={salvarEdicao} disabled={salvando}
                    className="flex-1 lift bg-cyan-500 hover:bg-cyan-400 text-white font-black rounded-2xl py-3 shadow-md transition-all text-sm disabled:opacity-60">
                    {salvando ? "Salvando..." : "Salvar Alterações"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Saídas de Caixa */}
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="px-5 py-3 bg-red-50 border-b border-red-100">
              <h3 className="font-extrabold text-red-500 text-sm">Saídas de Caixa</h3>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-gray-50 text-gray-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Data / Hora</th>
                    <th className="px-5 py-4">Motivo</th>
                    <th className="px-5 py-4 text-right">Valor</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {saidas.length === 0
                    ? <tr><td colSpan="3" className="text-center py-12 text-gray-300 font-bold">Nenhuma saída registrada.</td></tr>
                    : [...saidas].reverse().map((s, i) => (
                        <tr key={i} className="border-t border-gray-50 hover:bg-red-50/30 transition-colors">
                          <td className="px-5 py-3.5">
                            <p className="font-bold text-gray-800">{s.data}</p>
                            <p className="text-gray-400 text-xs">{s.hora}</p>
                          </td>
                          <td className="px-5 py-3.5 text-gray-600 font-semibold">{s.motivo}</td>
                          <td className="px-5 py-3.5 text-right text-red-500 font-black">- R$ {Number(s.valor).toFixed(2)}</td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ── APP ROOT ── */
    const MENU = [
      { key:"dashboard", icon:"🏠", label:"Início",     color:"text-pink-500",    bg:"bg-pink-100"    },
      { key:"produtos",  icon:"📦", label:"Produtos",   color:"text-purple-500",  bg:"bg-purple-100"  },
      { key:"vendas",    icon:"🛒", label:"Vender",     color:"text-cyan-500",    bg:"bg-cyan-100"    },
      { key:"estoque",   icon:"📋", label:"Estoque",    color:"text-yellow-500",  bg:"bg-yellow-100"  },
      { key:"saidas",    icon:"💸", label:"Saídas Caixa",color:"text-red-500",    bg:"bg-red-100"     },
      { key:"historico", icon:"📊", label:"Relatório",  color:"text-emerald-500", bg:"bg-emerald-100" },
    ];

    function App() {
      const [logado,       setLogado]       = useState(false);
      const [usuario,      setUsuario]      = useState("");
      const [tela,         setTela]         = useState("dashboard");
      const [produtos,     setProdutos]     = useState([]);
      const [vendas,       setVendas]       = useState([]);
      const [saidas,       setSaidas]       = useState([]);
      const [toasts,       setToasts]       = useState([]);
      const [sideOpen,     setSideOpen]     = useState(false);
      const [carregando,   setCarregando]   = useState(false);
      const [caixaAberto,  setCaixaAberto]  = useState(false);
      const [valorCaixa,   setValorCaixa]   = useState(0);
      const [modalCaixa,   setModalCaixa]   = useState(false);
      const [valorInicial, setValorInicial] = useState("");
      const [carrinho,     setCarrinho]     = useState([]);
      const [modalVenda,   setModalVenda]   = useState(false);
      const api = useApi();

      function addToast(msg, type = "success") {
        const id = Date.now() + Math.random();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4200);
      }

      async function handleLogin(u) {
        setLogado(true);
        setUsuario(u);
        
        // Verifica se já existe caixa aberto hoje
        setCarregando(true);
        const res = await api.call("getCaixaAberto");
        setCarregando(false);
        
        const hoje = new Date().toLocaleDateString("pt-BR");
        if (res.success && res.data && res.data.data === hoje) {
          // Caixa já aberto hoje: carrega dados e pula modal
          // FIX: aceita "valorInicial" (camelCase correto) e "valorinicial" (legado)
          const valCaixa = res.data.valorInicial ?? res.data.valorinicial ?? 0;
          setCaixaAberto(true);
          setValorCaixa(Number(valCaixa) || 0);
        } else {
          // Caixa não aberto: mostra modal
          setModalCaixa(true);
        }
      }

      async function abrirCaixa() {
        const val = parseFloat(valorInicial.replace(",", "."));
        if (isNaN(val) || val < 0) return addToast("Informe um valor válido.", "error");
        
        // Salva na planilha
        const res = await api.call("abrirCaixa", { caixa: { valorInicial: val, usuario: usuario } });
        if (!res.success) return addToast("Erro ao abrir caixa: " + res.error, "error");

        setValorCaixa(val);
        setCaixaAberto(true);
        setModalCaixa(false);
        addToast("Caixa aberto com sucesso!");
      }

      useEffect(() => {
        if (!logado || !caixaAberto) return;
        setCarregando(true);
        Promise.all([api.call("getProdutos"), api.call("getVendas"), api.call("getSaidasCaixa")]).then(([p, v, s]) => {
          if (p.success) setProdutos(p.data || []);
          else addToast("Erro ao carregar produtos.", "error");
          if (v.success) setVendas(v.data || []);
          if (s.success) setSaidas(s.data || []);
          setCarregando(false);
        });
      }, [logado, caixaAberto]);



      if (!logado)
        return <LoginScreen onLogin={handleLogin} />;

      const props = { produtos, setProdutos, vendas, setVendas, addToast, api };
      const vendaProps = { ...props, carrinho, setCarrinho };

      function renderTela() {
        if (carregando) return (
          <div className="flex flex-col items-center justify-center py-40 gap-4">
            <span className="text-5xl animate-spin-slow">⏳</span>
            <p className="text-gray-400 font-bold animate-pulse">Carregando dados...</p>
          </div>
        );
        switch(tela) {
          case "dashboard": return <Dashboard {...props} />;
          case "produtos":  return <Produtos  {...props} />;
          case "vendas":    return <Vendas    {...vendaProps} />;
          case "estoque":   return <Estoque   {...props} />;
          case "saidas":    return <SaidasCaixa saidas={saidas} setSaidas={setSaidas} addToast={addToast} api={api} />;
          case "historico": return <Historico {...props} saidas={saidas} valorCaixa={valorCaixa} caixaAberto={caixaAberto} onFecharCaixa={() => { setCaixaAberto(false); setValorCaixa(0); setVendas([]); setSaidas([]); setCarrinho([]); setModalCaixa(true); addToast("Caixa fechado! Abra um novo para continuar.", "warn"); setTela("dashboard"); }} />;
          default:          return null;
        }
      }

      return (
        <div className="min-h-screen bg-[#fdf4f7] flex">
          <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute -top-24 -right-24 w-[500px] h-[500px] bg-cyan-100/40 rounded-full blur-3xl" />
            <div className="absolute -bottom-24 -left-24 w-[500px] h-[500px] bg-pink-100/40 rounded-full blur-3xl" />
          </div>

          {sideOpen && (
            <div className="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 md:hidden"
              onClick={() => setSideOpen(false)} />
          )}

          <aside className={`sidebar-trans fixed md:relative z-50 flex flex-col w-60 min-h-screen bg-white border-r-2 border-pink-100 shadow-lg ${sideOpen ? "translate-x-0" : "-translate-x-full md:translate-x-0"}`}>
            <div className="p-5 border-b-2 border-pink-50 flex flex-col items-center text-center">
              <img src="logo.png" alt="Bibi Papelaria"
                className="w-24 h-24 object-cover rounded-full drop-shadow-md mb-1" />
              <p className="text-gray-400 text-[10px] font-black bg-gray-50 px-3 py-1 rounded-full mt-1">
                {usuario}
              </p>
              {caixaAberto && (
                <p className="text-emerald-500 text-[10px] font-black bg-emerald-50 px-3 py-1 rounded-full mt-1">
                  Caixa Aberto
                </p>
              )}
            </div>

            <nav className="flex-1 p-3 flex flex-col gap-1">
              {MENU.map(m => {
                const ativo = tela === m.key;
                return (
                  <button key={m.key}
                    onClick={() => { setTela(m.key); setSideOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-bold transition-all ${
                      ativo ? `${m.bg} ${m.color} shadow-sm` : "text-gray-500 hover:bg-gray-50 hover:text-gray-700"
                    }`}>
                    <span className="text-xl">{m.icon}</span>
                    {m.label}
                    {ativo && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-current opacity-60" />}
                  </button>
                );
              })}
            </nav>

            <div className="p-3 border-t-2 border-pink-50">
              <button
                onClick={() => { setLogado(false); setUsuario(""); setProdutos([]); setVendas([]); setSaidas([]); setTela("dashboard"); setCaixaAberto(false); setValorCaixa(0); }}
                className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-2xl text-sm font-bold text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                Sair
              </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-h-screen relative z-10 overflow-hidden">
            <div className="md:hidden flex items-center gap-3 p-4 border-b-2 border-pink-100 bg-white sticky top-0 z-30 shadow-sm">
              <button onClick={() => setSideOpen(true)}
                className="w-10 h-10 rounded-xl bg-pink-50 text-pink-500 font-bold flex items-center justify-center text-xl">☰</button>
              <img src="logo.png" className="w-8 h-8 object-cover rounded-full" alt="" />
              <span className="text-pink-500 font-black">Bibi Papelaria</span>
            </div>

            <div className="flex-1 p-4 md:p-7 overflow-y-auto w-full max-w-7xl mx-auto">
              {renderTela()}
            </div>
          </main>

          <Toast toasts={toasts} />

          {/* ── BOTÃO FLUTUANTE VENDA ── */}
          {caixaAberto && (
            <button
              onClick={() => setModalVenda(true)}
              className="fixed bottom-6 right-6 z-[80] flex items-center gap-3 bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-white font-black rounded-full shadow-2xl transition-all"
              style={{ padding: carrinho.length > 0 ? "14px 22px 14px 18px" : "18px" }}
              title="Nova Venda"
            >
              <svg xmlns="http://www.w3.org/2000/svg" className="w-7 h-7 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z" />
              </svg>
              {carrinho.length > 0 && (
                <span className="flex items-center gap-2 text-base">
                  <span className="bg-white text-emerald-600 rounded-full w-6 h-6 flex items-center justify-center text-xs font-black">{carrinho.length}</span>
                  Vender
                </span>
              )}
            </button>
          )}

          {/* ── MODAL VENDA RÁPIDA (FLUTUANTE) ── */}
          {modalVenda && (
            <div className="fixed inset-0 z-[90] flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm p-0 sm:p-4"
                 onClick={e => e.target === e.currentTarget && setModalVenda(false)}>
              <div className="animate-bounceIn bg-white w-full sm:max-w-2xl rounded-t-3xl sm:rounded-3xl shadow-2xl flex flex-col max-h-[92vh] overflow-hidden">

                {/* Header do modal */}
                <div className="flex items-center justify-between px-5 py-4 border-b-2 border-gray-100">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-emerald-100 rounded-2xl flex items-center justify-center">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z" />
                      </svg>
                    </div>
                    <h2 className="text-xl font-black text-gray-800">Nova Venda</h2>
                    {carrinho.length > 0 && (
                      <span className="bg-emerald-100 text-emerald-600 text-xs font-black px-2.5 py-1 rounded-full">{carrinho.length} item(s)</span>
                    )}
                  </div>
                  <button onClick={() => setModalVenda(false)}
                    className="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 font-bold text-lg transition-colors">✕</button>
                </div>

                {/* Corpo: componente Vendas completo dentro do modal */}
                <div className="flex-1 overflow-y-auto p-4">
                  <VendaInline
                    {...vendaProps}
                    carrinho={carrinho}
                    setCarrinho={setCarrinho}
                    onVendaFinalizada={() => setModalVenda(false)}
                  />
                </div>
              </div>
            </div>
          )}

          {/* Modal Abrir Caixa */}
          <Modal open={modalCaixa} onClose={() => {}} title="Abrir Caixa">
            <div className="flex flex-col gap-4">
              <div className="bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-4 text-center">
                <span className="text-4xl">💰</span>
                <p className="text-emerald-600 font-black text-lg mt-2">Abertura de Caixa</p>
                <p className="text-emerald-500 text-sm mt-1">Informe o valor inicial em caixa</p>
              </div>
              <Field label="Valor Inicial (R$)">
                <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={valorInicial} onChange={e => setValorInicial(e.target.value)} />
              </Field>
              <button onClick={abrirCaixa}
                className="lift w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black rounded-2xl py-3.5 shadow-md transition-all text-base">
                Abrir Caixa
              </button>
            </div>
          </Modal>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
