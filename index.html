  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          setInterval(() => reg.update(), 60000);
          function onNewSW(sw) {
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed') mostrarBannerAtualizacao(sw);
            });
          }
          if (reg.waiting) { mostrarBannerAtualizacao(reg.waiting); }
          reg.addEventListener('updatefound', () => { onNewSW(reg.installing); });
          navigator.serviceWorker.addEventListener('controllerchange', () => { window.location.reload(); });
        } catch (err) { console.warn('[SW] Registro falhou:', err); }
      });
    }
    function mostrarBannerAtualizacao(sw) {
      const banner = document.getElementById('update-banner');
      if (!banner) return;
      banner.style.display = 'flex';
      document.getElementById('update-btn').onclick = () => {
        sw.postMessage('SKIP_WAITING');
        banner.style.display = 'none';
      };
    }
  </script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #fdf4f7; color: #374151; }
    body::selection, ::selection { background: #fbcfe8; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #fdf2f8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
    @keyframes fadeIn   { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
    @keyframes bounceIn { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes toastIn  { from{opacity:0;transform:translateX(120%)} to{opacity:1;transform:translateX(0)} }
    .animate-fadeIn   { animation: fadeIn .35s ease both; }
    .animate-slideIn  { animation: slideIn .3s ease both; }
    .animate-bounceIn { animation: bounceIn .4s cubic-bezier(.36,.07,.19,.97) both; }
    .animate-spin-slow{ animation: spin 1.2s linear infinite; }
    .animate-pulse    { animation: pulse 1.5s ease-in-out infinite; }
    .toast-enter      { animation: toastIn .35s cubic-bezier(.21,1.02,.73,1) both; }
    .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 2px solid #fce7f3; }
    .field:focus { outline:none; border-color:#f472b6; box-shadow:0 0 0 4px rgba(244,114,182,0.12); }
    .sidebar-trans { transition: transform .28s cubic-bezier(.4,0,.2,1); }
    .lift { transition: transform .2s ease, box-shadow .2s ease; }
    .lift:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .lift:active { transform: translateY(0); }
    .solid-card { background: #ffffff; border: 2px solid #f3f4f6; border-radius: 1.5rem; }

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = window.React;

    // ── SUPABASE CONFIG ──
    const SUPABASE_URL  = "https://ybgytuqdktenrgfgelik.supabase.co";
    const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliZ3l0dXFka3RlbnJnZmdlbGlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjA5MjcsImV4cCI6MjA5NDc5NjkyN30.15woXuJi8wfHth1bFm8jR7dJVc03UONZwnmo-hx4RqU";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const USERS = [
      { user: "admin",    pass: "bibi2025", role: "admin"    },
      { user: "operador", pass: "bibi123",  role: "operador" },
    ];

    function generateCode() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let code = "PRD-";
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    // ── CAMADA DE API — agora usando Supabase diretamente ──
    function useApi() {
      const call = useCallback(async (action, payload = {}) => {
        try {
          // ── getProdutos ──
          if (action === "getProdutos") {
            const { data, error } = await sb.from("produtos").select("*").order("nome");
            if (error) throw error;
            const mapped = data.map(p => ({
              nome: p.nome, codigo: p.codigo, categoria: p.categoria || "",
              preco: String(p.preco), quantidade: String(p.quantidade),
              fornecedor: p.fornecedor || "", preco_custo: String(p.preco_custo || "0")
            }));
            return { success: true, data: mapped };
          }

          // ── addProduto ──
          if (action === "addProduto") {
            const p = payload.produto;
            const { error } = await sb.from("produtos").insert({
              nome: p.nome, codigo: p.codigo, categoria: p.categoria || null,
              preco: Number(p.preco), quantidade: Number(p.quantidade) || 0, fornecedor: p.fornecedor || null
            });
            if (error) throw error;
            return { success: true };
          }

          // ── updateProduto ──
          if (action === "updateProduto") {
            const p = payload.produto;
            const { error } = await sb.from("produtos").update({
              nome: p.nome, categoria: p.categoria || null,
              preco: Number(p.preco), quantidade: Number(p.quantidade) || 0, fornecedor: p.fornecedor || null
            }).eq("codigo", p.codigo);
            if (error) throw error;
            return { success: true };
          }

          // ── deleteProduto ──
          if (action === "deleteProduto") {
            const { error } = await sb.from("produtos").delete().eq("codigo", payload.codigo);
            if (error) throw error;
            return { success: true };
          }

          // ── getVendas ──
          if (action === "getVendas") {
            const { data, error } = await sb.from("vendas").select("*").order("data", { ascending: false }).order("hora", { ascending: true });
            if (error) throw error;
            const mapped = data.map(v => ({
              _id: v.id,
              data: new Date(v.data + "T00:00:00").toLocaleDateString("pt-BR"),
              hora: v.hora ? v.hora.substring(0,8) : "",
              itens: v.itens, subtotal: String(v.subtotal),
              desconto: String(v.desconto), total: String(v.total), pagamento: v.pagamento
            }));
            return { success: true, data: mapped };
          }

          // ── registrarVenda ──
          if (action === "registrarVenda") {
            const v = payload.venda;
            const carrinho = payload.carrinho || [];

            // Converte data pt-BR (dd/mm/yyyy) → ISO
            const partes = v.data.split("/");
            const dataISO = `${partes[2]}-${partes[1]}-${partes[0]}`;

            const { error: errVenda } = await sb.from("vendas").insert({
              data: dataISO, hora: v.hora,
              itens: v.itens, subtotal: Number(v.subtotal),
              desconto: Number(v.desconto), total: Number(v.total), pagamento: v.pagamento
            });
            if (errVenda) throw errVenda;

            // Desconta estoque
            for (const item of carrinho) {
              if (item.isAvulso) continue;
              const { data: prod } = await sb.from("produtos").select("quantidade").eq("codigo", item.codigo).single();
              if (prod) {
                await sb.from("produtos").update({ quantidade: Math.max(0, prod.quantidade - item.qtd) }).eq("codigo", item.codigo);
              }
            }
            return { success: true };
          }

          // ── updateVenda ──
          if (action === "updateVenda") {
            const v = payload.venda;
            if (!v._id) return { success: false, error: "ID da venda não encontrado." };
            const { error } = await sb.from("vendas").update({
              pagamento: v.pagamento,
              desconto: Number(v.desconto),
              subtotal: Number(v.subtotal),
              total: Number(v.total)
            }).eq("id", v._id);
            if (error) throw error;
            return { success: true };
          }

          // ── deleteVenda ──
          if (action === "deleteVenda") {
            const v = payload.venda;
            if (!v || !v._id) return { success: false, error: "ID da venda não encontrado." };
            const { error } = await sb.from("vendas").delete().eq("id", v._id);
            if (error) throw error;
            return { success: true };
          }

          // ── getSaidasCaixa ──
          if (action === "getSaidasCaixa") {
            const _d = new Date();
            const hoje = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,"0")}-${String(_d.getDate()).padStart(2,"0")}`;
            const { data, error } = await sb.from("saidas_caixa").select("*").eq("data", hoje).order("hora");
            if (error) throw error;
            const mapped = data.map(s => ({
              _id: s.id,
              data: new Date(s.data + "T00:00:00").toLocaleDateString("pt-BR"),
              hora: s.hora ? s.hora.substring(0,8) : "",
              valor: String(s.valor), motivo: s.motivo
            }));
            return { success: true, data: mapped };
          }

          // ── getSaidasByData ──
          if (action === "getSaidasByData") {
            const { data, error } = await sb.from("saidas_caixa").select("*").eq("data", payload.dataISO).order("hora");
            if (error) throw error;
            const mapped = data.map(s => ({
              _id: s.id,
              data: new Date(s.data + "T00:00:00").toLocaleDateString("pt-BR"),
              hora: s.hora ? s.hora.substring(0,8) : "",
              valor: String(s.valor), motivo: s.motivo
            }));
            return { success: true, data: mapped };
          }

          // ── addSaidaCaixa ──
          if (action === "addSaidaCaixa") {
            const s = payload.saida;
            const partes = s.data.split("/");
            const dataISO = `${partes[2]}-${partes[1]}-${partes[0]}`;
            const { error } = await sb.from("saidas_caixa").insert({
              data: dataISO, hora: s.hora,
              valor: Number(s.valor), motivo: s.motivo
            });
            if (error) throw error;
            return { success: true };
          }

          // ── getCaixaByData ──
          if (action === "getCaixaByData") {
            const { data, error } = await sb.from("caixa").select("*").eq("data", payload.dataISO).order("hora", { ascending: false }).limit(1);
            if (error) throw error;
            if (data && data.length > 0) {
              return { success: true, data: { valorInicial: data[0].valorinicial } };
            }
            return { success: true, data: null };
          }

          // ── getCaixaAberto ──
          if (action === "getCaixaAberto") {
            const { data, error } = await sb.from("caixa").select("*").order("data", { ascending: false }).order("hora", { ascending: false }).limit(1);
            if (error) throw error;
            if (data && data.length > 0) {
              const c = data[0];
              return { success: true, data: { dataISO: c.data, valorInicial: c.valorinicial, usuario: c.usuario, fechado: !!c.fechado_em } };
            }
            return { success: true, data: null };
          }

          // ── abrirCaixa ──
          if (action === "abrirCaixa") {
            const c = payload.caixa;
            const d = new Date();
            const hoje = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
            const hora  = d.toLocaleTimeString("pt-BR");
            const { error } = await sb.from("caixa").insert({
              data: hoje, hora: hora,
              valorinicial: Number(c.valorInicial), usuario: c.usuario
            });
            if (error) throw error;
            return { success: true };
          }

          // ── fecharCaixa ──
          if (action === "fecharCaixa") {
            const { data: rows } = await sb.from("caixa").select("id").order("data", { ascending: false }).order("hora", { ascending: false }).limit(1);
            if (rows && rows.length > 0) {
              await sb.from("caixa").update({ fechado_em: new Date().toISOString() }).eq("id", rows[0].id);
            }
            return { success: true };
          }

          // ── getBoletos ──
          if (action === "getBoletos") {
            const { data, error } = await sb.from("boletos").select("*").order("data_vencimento");
            if (error) throw error;
            return { success: true, data: data.map(b => ({ ...b, data_emissao: b.data_emissao, data_vencimento: b.data_vencimento })) };
          }
          if (action === "addBoleto") {
            const { error } = await sb.from("boletos").insert(payload.boleto);
            if (error) throw error;
            return { success: true };
          }
          if (action === "updateBoleto") {
            const { error } = await sb.from("boletos").update(payload.dados).eq("id", payload.id);
            if (error) throw error;
            return { success: true };
          }
          if (action === "deleteBoleto") {
            const { error } = await sb.from("boletos").delete().eq("id", payload.id);
            if (error) throw error;
            return { success: true };
          }

          // ── getClientes ──
          if (action === "getClientes") {
            const { data, error } = await sb.from("clientes").select("*").order("nome");
            if (error) throw error;
            return { success: true, data };
          }
          if (action === "addCliente") {
            const { data, error } = await sb.from("clientes").insert(payload.cliente).select().single();
            if (error) throw error;
            return { success: true, data };
          }
          if (action === "updateCliente") {
            const { error } = await sb.from("clientes").update(payload.dados).eq("id", payload.id);
            if (error) throw error;
            return { success: true };
          }
          if (action === "deleteCliente") {
            const { error } = await sb.from("clientes").delete().eq("id", payload.id);
            if (error) throw error;
            return { success: true };
          }

          // ── getFiado ──
          if (action === "getFiado") {
            const { data, error } = await sb.from("fiado").select("*, clientes(nome)").order("data", { ascending: false });
            if (error) throw error;
            return { success: true, data };
          }
          if (action === "addFiado") {
            const { data, error } = await sb.from("fiado").insert(payload.fiado).select().single();
            if (error) throw error;
            return { success: true, data };
          }
          if (action === "getFiadoCliente") {
            const { data, error } = await sb.from("fiado").select("*, fiado_pagamentos(*)").eq("cliente_id", payload.clienteId).order("data", { ascending: false });
            if (error) throw error;
            return { success: true, data };
          }
          if (action === "addFiadoPagamento") {
            const { error: errPag } = await sb.from("fiado_pagamentos").insert(payload.pagamento);
            if (errPag) throw errPag;
            const { data: fiadoAtual } = await sb.from("fiado").select("valor_pago").eq("id", payload.pagamento.fiado_id).single();
            const novoPago = Number(fiadoAtual?.valor_pago || 0) + Number(payload.pagamento.valor);
            const { error: errUpd } = await sb.from("fiado").update({ valor_pago: novoPago }).eq("id", payload.pagamento.fiado_id);
            if (errUpd) throw errUpd;
            return { success: true };
          }

          // ── getDatas ──
          if (action === "getDatas") {
            const { data, error } = await sb.from("datas_comemorativas").select("*").order("mes").order("dia");
            if (error) throw error;
            return { success: true, data };
          }
          if (action === "addData") {
            const { error } = await sb.from("datas_comemorativas").insert(payload.data);
            if (error) throw error;
            return { success: true };
          }
          if (action === "updateData") {
            const { error } = await sb.from("datas_comemorativas").update(payload.dados).eq("id", payload.id);
            if (error) throw error;
            return { success: true };
          }
          if (action === "deleteData") {
            const { error } = await sb.from("datas_comemorativas").delete().eq("id", payload.id);
            if (error) throw error;
            return { success: true };
          }

          // ── getMeta ──
          if (action === "getMeta") {
            const { data, error } = await sb.from("metas").select("*").eq("mes", payload.mes).eq("ano", payload.ano).single();
            if (error && error.code !== "PGRST116") throw error;
            return { success: true, data: data || null };
          }
          if (action === "setMeta") {
            const { error } = await sb.from("metas").upsert({ mes: payload.mes, ano: payload.ano, valor: payload.valor }, { onConflict: "mes,ano" });
            if (error) throw error;
            return { success: true };
          }

          // ── updatePrecoCusto ──
          if (action === "updatePrecoCusto") {
            const { error: errProd } = await sb.from("produtos").update({ preco_custo: Number(payload.preco_custo) }).eq("codigo", payload.codigo);
            if (errProd) throw errProd;
            await sb.from("historico_preco_custo").insert({
              produto_codigo: payload.codigo,
              preco_custo_anterior: payload.anterior,
              preco_custo_novo: Number(payload.preco_custo),
              usuario: payload.usuario
            });
            return { success: true };
          }

          return { success: false, error: `Ação desconhecida: ${action}` };

        } catch (e) {
          console.error("[SUPABASE]", action, e);
          return { success: false, error: e.message };
        }
      }, []);
      return { call };
    }

    function Toast({ toasts }) {
      return (
        <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className={`toast-enter pointer-events-auto flex items-center gap-3 px-5 py-3.5 rounded-2xl text-sm font-bold shadow-xl border-2 bg-white ${
              t.type === "success" ? "border-emerald-300 text-emerald-600" :
              t.type === "warn"    ? "border-yellow-300 text-yellow-600"   :
              "border-red-300 text-red-500"
            }`}>
              <span className="text-lg">{t.type === "success" ? "✨" : t.type === "warn" ? "⚠️" : "❌"}</span>
              <span>{t.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    function Modal({ open, onClose, title, children, wide, bloqueado }) {
      useEffect(() => {
        if (open) document.body.style.overflow = "hidden";
        else document.body.style.overflow = "";
        return () => { document.body.style.overflow = ""; };
      }, [open]);
      if (!open) return null;
      const overlay = (
        <div style={{position:"fixed",inset:0,zIndex:9999,overflowY:"auto",background:"rgba(0,0,0,0.4)",backdropFilter:"blur(4px)"}}>
          <div style={{display:"flex",minHeight:"100%",alignItems:"center",justifyContent:"center",padding:"16px"}}
               onClick={e => e.target === e.currentTarget && !bloqueado && onClose()}>
            <div className={`animate-bounceIn bg-white rounded-3xl p-6 w-full shadow-2xl ${wide ? "max-w-lg" : "max-w-md"}`}
                 style={{position:"relative"}}>
              <div className="flex items-center justify-between mb-5">
                <h2 className="text-xl font-black text-pink-500">{title}</h2>
                {!bloqueado && (
                  <button onClick={onClose}
                    className="w-8 h-8 flex items-center justify-center rounded-full bg-pink-50 text-pink-400 hover:bg-pink-100 font-bold text-xl transition-colors">✕</button>
                )}
              </div>
              {children}
            </div>
          </div>
        </div>
      );
      return ReactDOM.createPortal(overlay, document.body);
    }

    function Field({ label, children }) {
      return (
        <div>
          <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">{label}</label>
          {children}
        </div>
      );
    }
    const inputCls = "field w-full bg-white border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-700 font-semibold transition-all";

    function StatCard({ icon, label, value, sub, color, bg }) {
      return (
        <div className="lift bg-white rounded-3xl p-5 flex flex-col gap-3 shadow-sm border-2 border-gray-100">
          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-2xl ${bg}`}>{icon}</div>
          <div>
            <p className="text-gray-400 text-[10px] font-black uppercase tracking-widest">{label}</p>
            <p className={`text-2xl font-black mt-0.5 ${color}`}>{value}</p>
            {sub && <p className="text-gray-400 text-xs font-semibold mt-0.5">{sub}</p>}
          </div>
        </div>
      );
    }

    function StockBadge({ qty }) {
      const n = Number(qty);
      if (n === 0) return <span className="bg-red-100 text-red-600 text-[10px] px-2.5 py-1 rounded-full font-black">Esgotado</span>;
      if (n <= 5)  return <span className="bg-yellow-100 text-yellow-600 text-[10px] px-2.5 py-1 rounded-full font-black">Acabando</span>;
      return         <span className="bg-emerald-100 text-emerald-600 text-[10px] px-2.5 py-1 rounded-full font-black">OK</span>;
    }

    function LoginScreen({ onLogin }) {
      const [user, setUser] = useState("");
      const [pass, setPass] = useState("");
      const [err,  setErr]  = useState("");
      const [loading, setLoading] = useState(false);

      function handle(e) {
        e.preventDefault();
        setLoading(true);
        setTimeout(() => {
          const ok = USERS.find(u => u.user === user && u.pass === pass);
          if (ok) onLogin(user, ok.role);
          else { setErr("Usuário ou senha incorretos."); setLoading(false); }
        }, 400);
      }

      return (
        <div className="min-h-screen bg-[#fdf4f7] flex items-center justify-center p-4 relative overflow-hidden">
          <div className="absolute -top-24 -left-24 w-96 h-96 bg-pink-200/40 rounded-full blur-3xl pointer-events-none" />
          <div className="absolute -bottom-24 -right-24 w-96 h-96 bg-cyan-200/40 rounded-full blur-3xl pointer-events-none" />
          <div className="absolute top-1/3 right-1/4 w-64 h-64 bg-yellow-200/30 rounded-full blur-3xl pointer-events-none" />
          <form onSubmit={handle}
            className="animate-bounceIn relative z-10 w-full max-w-sm bg-white border-2 border-pink-100 rounded-[2rem] p-8 shadow-xl">
            <div className="flex flex-col items-center mb-7">
              <img src="logo.png" alt="Bibi Papelaria"
                className="w-36 h-36 object-cover rounded-full drop-shadow-lg mb-2" />
              <p className="text-gray-400 font-bold text-xs">Acesso ao Sistema</p>
            </div>
            <div className="flex flex-col gap-4">
              <Field label="Usuário">
                <input className={inputCls} placeholder="admin" value={user} onChange={e => setUser(e.target.value)} />
              </Field>
              <Field label="Senha">
                <input type="password" className={inputCls} placeholder="••••••••" value={pass} onChange={e => setPass(e.target.value)} />
              </Field>
              {err && <p className="text-red-500 font-bold text-sm text-center bg-red-50 py-2 rounded-xl">{err}</p>}
              <button type="submit" disabled={loading}
                className="lift w-full mt-2 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-400 hover:to-purple-400 text-white font-black rounded-2xl py-4 shadow-lg text-base transition-all disabled:opacity-70">
                {loading ? "Entrando..." : "Entrar"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function Dashboard({ produtos, vendas, api, isAdmin }) {
      const hoje = new Date().toLocaleDateString("pt-BR");
      const agora = new Date();
      const mesAtual = agora.getMonth() + 1;
      const anoAtual = agora.getFullYear();

      const vendasHoje = vendas.filter(v => v.data === hoje);
      const totalHoje  = vendasHoje.reduce((s, v) => s + Number(v.total || 0), 0);
      const estoqueBaixo = produtos.filter(p => Number(p.quantidade) <= 5).length;

      // Vendas do mês atual
      const vendasMes = vendas.filter(v => {
        if (!v.data) return false;
        const [d, m, a] = v.data.split("/");
        return Number(m) === mesAtual && Number(a) === anoAtual;
      });
      const totalMes = vendasMes.reduce((s, v) => s + Number(v.total || 0), 0);

      // Produto de maior saída no mês
      const contagem = {};
      vendasMes.forEach(v => {
        if (!v.itens) return;
        v.itens.split(", ").forEach(part => {
          const m = part.match(/^(.*)\((\d+)\)$/);
          if (m) {
            const nome = m[1].trim();
            const qty  = Number(m[2]);
            contagem[nome] = (contagem[nome] || 0) + qty;
          }
        });
      });
      const topProduto = Object.entries(contagem).sort((a, b) => b[1] - a[1])[0];

      // Curva de vendas: total por dia no mês atual
      const diasNoMes = new Date(anoAtual, mesAtual, 0).getDate();
      const vendasPorDia = Array.from({ length: diasNoMes }, (_, i) => {
        const dia = String(i + 1).padStart(2, "0");
        const mesStr = String(mesAtual).padStart(2, "0");
        const dataStr = `${dia}/${mesStr}/${anoAtual}`;
        return vendasMes.filter(v => v.data === dataStr).reduce((s, v) => s + Number(v.total || 0), 0);
      });
      const maxDia = Math.max(...vendasPorDia, 1);

      // Dados extras (boletos + datas)
      const [boletos,       setBoletos]       = useState([]);
      const [datas,         setDatas]         = useState([]);
      const [meta,          setMeta]          = useState(null);
      const [carregandoExt, setCarregandoExt] = useState(true);

      useEffect(() => {
        Promise.all([
          api.call("getBoletos"),
          api.call("getDatas"),
          isAdmin ? api.call("getMeta", { mes: mesAtual, ano: anoAtual }) : Promise.resolve({ success: false })
        ]).then(([b, d, mt]) => {
          if (b.success) setBoletos(b.data || []);
          if (d.success) setDatas(d.data || []);
          if (mt.success && mt.data) setMeta(mt.data);
          setCarregandoExt(false);
        });
      }, []);

      // Boletos vencendo em até 3 dias
      const hoje3 = new Date(); hoje3.setDate(hoje3.getDate() + 3);
      const boletosAlerta = boletos.filter(b => {
        if (b.status === "pago") return false;
        const venc = new Date(b.data_vencimento + "T00:00:00");
        return venc <= hoje3;
      });

      // Datas comemorativas nos próximos 7 dias
      const datasAlerta = datas.filter(d => {
        const dataEvento = new Date(anoAtual, d.mes - 1, d.dia);
        if (dataEvento < agora) { dataEvento.setFullYear(anoAtual + 1); }
        const diff = Math.ceil((dataEvento - agora) / 86400000);
        return diff >= 0 && diff <= 7;
      }).map(d => {
        const dataEvento = new Date(anoAtual, d.mes - 1, d.dia);
        if (dataEvento < agora) dataEvento.setFullYear(anoAtual + 1);
        return { ...d, diasRestantes: Math.ceil((dataEvento - agora) / 86400000) };
      });

      const progMeta = meta ? Math.min(100, (totalMes / Number(meta.valor)) * 100) : 0;

      return (
        <div className="flex flex-col gap-6 animate-fadeIn">
          <div>
            <h1 className="text-2xl font-black text-gray-800">Resumo de Hoje</h1>
            <p className="text-gray-400 font-bold text-sm mt-0.5">{hoje}</p>
          </div>

          {/* Alertas */}
          {(boletosAlerta.length > 0 || datasAlerta.length > 0) && (
            <div className="flex flex-col gap-3">
              {boletosAlerta.map(b => {
                const venc = new Date(b.data_vencimento + "T00:00:00");
                const diff = Math.ceil((venc - new Date()) / 86400000);
                const vencido = diff < 0;
                return (
                  <div key={b.id} className={`flex items-center gap-3 px-4 py-3 rounded-2xl border-2 font-bold text-sm ${vencido ? "bg-red-50 border-red-200 text-red-600" : "bg-orange-50 border-orange-200 text-orange-600"}`}>
                    <span className="text-xl">🧾</span>
                    <span className="flex-1">{vencido ? "VENCIDO" : `Vence em ${diff}d`} — Boleto: <strong>{b.fornecedor}</strong> R$ {Number(b.valor).toFixed(2)}</span>
                  </div>
                );
              })}
              {datasAlerta.map(d => (
                <div key={d.id} className="flex items-center gap-3 px-4 py-3 rounded-2xl border-2 bg-purple-50 border-purple-200 text-purple-600 font-bold text-sm">
                  <span className="text-xl">🎉</span>
                  <span className="flex-1"><strong>{d.nome}</strong> em {d.diasRestantes === 0 ? "hoje!" : `${d.diasRestantes} dia(s)`} — prepare suas promoções!</span>
                </div>
              ))}
            </div>
          )}

          {/* Cards principais */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard icon="📦" label="Produtos"     value={produtos.length}             color="text-purple-600" bg="bg-purple-100" />
            <StatCard icon="⚠️" label="Estoque Baixo" value={estoqueBaixo} sub="≤ 5 un." color="text-yellow-500" bg="bg-yellow-100" />
            <StatCard icon="💖" label="Vendas Hoje"  value={vendasHoje.length}           color="text-pink-500"   bg="bg-pink-100"   />
            <StatCard icon="💰" label="Faturamento"  value={`R$ ${totalHoje.toFixed(2)}`} color="text-cyan-600" bg="bg-cyan-100"   />
          </div>

          {/* Meta de vendas (admin only) */}
          {isAdmin && meta && (
            <div className="bg-white border-2 border-indigo-100 rounded-3xl p-5 shadow-sm">
              <div className="flex justify-between items-center mb-3">
                <h3 className="font-extrabold text-indigo-500 text-base">🎯 Meta do Mês (admin)</h3>
                <span className="text-sm font-black text-indigo-600">{progMeta.toFixed(0)}% — R$ {totalMes.toFixed(2)} / R$ {Number(meta.valor).toFixed(2)}</span>
              </div>
              <div className="h-4 bg-indigo-50 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700" style={{ width: `${progMeta}%`, background: progMeta >= 100 ? "#059669" : progMeta >= 70 ? "#6366f1" : "#f59e0b" }} />
              </div>
              {progMeta >= 100 && <p className="text-emerald-500 font-black text-sm mt-2">🎉 Meta atingida!</p>}
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {/* Produto de maior saída */}
            <div className="bg-white border-2 border-pink-100 rounded-3xl p-5 shadow-sm">
              <h3 className="font-extrabold text-pink-500 mb-4 text-base">🏆 Maior Saída do Mês</h3>
              {!topProduto
                ? <p className="text-gray-400 font-semibold text-sm">Nenhuma venda registrada este mês.</p>
                : <div className="flex flex-col gap-2">
                    <div className="bg-pink-50 rounded-2xl p-4 flex justify-between items-center">
                      <div>
                        <p className="text-gray-800 font-black text-base">{topProduto[0]}</p>
                        <p className="text-gray-400 text-xs font-bold mt-0.5">{topProduto[1]} unidades vendidas no mês</p>
                      </div>
                      <span className="text-3xl">🥇</span>
                    </div>
                    {Object.entries(contagem).sort((a,b) => b[1]-a[1]).slice(1,4).map(([nome, qty]) => (
                      <div key={nome} className="flex justify-between items-center px-3 py-2 rounded-xl bg-gray-50">
                        <span className="text-gray-600 font-bold text-xs truncate max-w-[70%]">{nome}</span>
                        <span className="text-gray-500 font-black text-xs">{qty} un.</span>
                      </div>
                    ))}
                  </div>
              }
            </div>

            {/* Curva de vendas mensais */}
            <div className="bg-white border-2 border-cyan-100 rounded-3xl p-5 shadow-sm">
              <div className="flex justify-between items-center mb-4">
                <h3 className="font-extrabold text-cyan-500 text-base">📈 Vendas do Mês</h3>
                <span className="text-xs font-black text-gray-400">R$ {totalMes.toFixed(2)}</span>
              </div>
              <div className="flex items-end gap-px h-24 overflow-hidden">
                {vendasPorDia.map((val, i) => (
                  <div key={i} className="flex-1 flex flex-col items-center justify-end group relative" title={`Dia ${i+1}: R$ ${val.toFixed(2)}`}>
                    <div className="w-full rounded-t transition-all duration-300"
                      style={{ height: `${(val / maxDia) * 88}px`, minHeight: val > 0 ? "3px" : "0",
                        background: i === agora.getDate() - 1 ? "#ec4899" : "#a5f3fc" }} />
                  </div>
                ))}
              </div>
              <div className="flex justify-between mt-1">
                <span className="text-gray-300 text-[9px] font-bold">1</span>
                <span className="text-gray-300 text-[9px] font-bold">{Math.ceil(diasNoMes/2)}</span>
                <span className="text-gray-300 text-[9px] font-bold">{diasNoMes}</span>
              </div>
            </div>

            {/* Produtos acabando */}
            <div className="bg-white border-2 border-yellow-100 rounded-3xl p-5 shadow-sm">
              <h3 className="font-extrabold text-yellow-500 mb-4 text-base">⚠️ Produtos Acabando</h3>
              {estoqueBaixo === 0
                ? <p className="text-gray-400 font-semibold text-sm">Estoque saudável em todos os produtos!</p>
                : <div className="flex flex-col gap-2">
                    {produtos.filter(p => Number(p.quantidade) <= 5).slice(0,6).map(p => (
                      <div key={p.codigo} className="flex justify-between items-center bg-yellow-50 px-4 py-2.5 rounded-2xl">
                        <span className="text-gray-700 font-bold text-sm truncate max-w-[65%]">{p.nome}</span>
                        <span className="bg-yellow-200 text-yellow-700 font-black text-xs px-3 py-1 rounded-full shrink-0">{p.quantidade} un.</span>
                      </div>
                    ))}
                  </div>
              }
            </div>

            {/* Últimas vendas */}
            <div className="bg-white border-2 border-cyan-100 rounded-3xl p-5 shadow-sm">
              <h3 className="font-extrabold text-cyan-500 mb-4 text-base">🛒 Últimas Vendas Hoje</h3>
              {vendasHoje.length === 0
                ? <p className="text-gray-400 font-semibold text-sm">Nenhuma venda hoje ainda.</p>
                : <div className="flex flex-col gap-2">
                    {[...vendasHoje].reverse().slice(0,5).map((v, i) => (
                      <div key={i} className="flex justify-between items-center bg-cyan-50 px-4 py-2.5 rounded-2xl">
                        <span className="text-gray-600 font-semibold text-xs truncate max-w-[60%]">{v.itens}</span>
                        <span className="text-cyan-600 font-black text-sm shrink-0">R$ {Number(v.total).toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
              }
            </div>
          </div>
        </div>
      );
    }

    function Produtos({ produtos, setProdutos, addToast, api, isAdmin, usuario }) {
      const [search,   setSearch]  = useState("");
      const [modal,    setModal]   = useState(false);
      const [editando, setEditando]= useState(null);
      const [form,     setForm]    = useState({ nome:"", codigo:"", preco:"", quantidade:"", preco_custo:"" });
      const [saving,   setSaving]  = useState(false);
      const f = key => e => setForm(p => ({ ...p, [key]: e.target.value }));

      function abrirNovo()    { setEditando(null); setForm({ nome:"", codigo: generateCode(), preco:"", quantidade:"", preco_custo:"" }); setModal(true); }
      function abrirEditar(p) { setEditando(p.codigo); setForm({ nome:p.nome, codigo:p.codigo, preco:p.preco, quantidade:p.quantidade, preco_custo: p.preco_custo || "0" }); setModal(true); }

      const margem = () => {
        const venda = Number(form.preco) || 0;
        const custo = Number(form.preco_custo) || 0;
        if (custo <= 0 || venda <= 0) return null;
        return ((venda - custo) / venda * 100).toFixed(1);
      };

      async function salvar() {
        if (!form.nome.trim()) return addToast("Nome é obrigatório.", "error");
        if (isNaN(Number(form.preco)) || Number(form.preco) < 0) return addToast("Preço inválido.", "error");
        setSaving(true);
        const prodData = { ...form, quantidade: form.quantidade || "0" };
        if (editando) {
          const res = await api.call("updateProduto", { produto: prodData });
          if (res.success) {
            // Salva histórico de preço de custo se admin e mudou
            const anterior = produtos.find(p => p.codigo === editando);
            if (isAdmin && anterior && anterior.preco_custo !== form.preco_custo) {
              await api.call("updatePrecoCusto", { codigo: editando, preco_custo: form.preco_custo, anterior: anterior.preco_custo, usuario });
            }
            setProdutos(prev => prev.map(p => p.codigo === editando ? { ...prodData } : p));
            addToast("Produto atualizado!");
          } else addToast(res.error || "Erro ao atualizar.", "error");
        } else {
          const res = await api.call("addProduto", { produto: prodData });
          if (res.success) { setProdutos(prev => [...prev, { ...prodData }]); addToast("Produto adicionado!"); }
          else addToast(res.error || "Erro ao adicionar.", "error");
        }
        setSaving(false); setModal(false);
      }

      async function excluir(codigo, nome) {
        if (!confirm(`Excluir "${nome}"?`)) return;
        const res = await api.call("deleteProduto", { codigo });
        if (res.success) { setProdutos(prev => prev.filter(p => p.codigo !== codigo)); addToast("Produto excluído."); }
        else addToast(res.error || "Erro ao excluir.", "error");
      }

      const filtrados = produtos.filter(p =>
        [p.nome, p.codigo].some(v => v?.toLowerCase().includes(search.toLowerCase()))
      );

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
            <h1 className="text-2xl font-black text-gray-800">Produtos</h1>
            <button onClick={abrirNovo}
              className="lift flex items-center gap-2 bg-pink-500 hover:bg-pink-400 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md text-sm">
              <span className="text-lg">+</span> Novo Produto
            </button>
          </div>
          <div className="relative">
            <span className="absolute left-4 top-3.5 text-gray-300 text-lg select-none">🔍</span>
            <input className="field w-full bg-white border-2 border-gray-200 rounded-2xl pl-12 pr-4 py-3 text-gray-700 placeholder-gray-300 font-semibold shadow-sm"
              placeholder="Pesquisar por nome ou código..."
              value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-pink-50 text-pink-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Produto</th>
                    <th className="px-5 py-4">Código</th>
                    <th className="px-5 py-4 text-right">Preço Venda</th>
                    {isAdmin && <th className="px-5 py-4 text-right">Custo</th>}
                    {isAdmin && <th className="px-5 py-4 text-right">Margem</th>}
                    <th className="px-5 py-4 text-right">Qtd</th>
                    <th className="px-5 py-4 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {filtrados.length === 0
                    ? <tr><td colSpan={isAdmin ? 7 : 5} className="text-center py-12 text-gray-300 font-bold">Nenhum produto encontrado</td></tr>
                    : filtrados.map(p => {
                        const mg = (() => { const v = Number(p.preco); const c = Number(p.preco_custo); return v > 0 && c > 0 ? ((v-c)/v*100).toFixed(1) : null; })();
                        return (
                          <tr key={p.codigo} className="border-t border-gray-50 hover:bg-pink-50/40 transition-colors">
                            <td className="px-5 py-3.5 font-bold text-gray-800 max-w-[180px] truncate">{p.nome}</td>
                            <td className="px-5 py-3.5 text-gray-400 text-xs font-mono">{p.codigo}</td>
                            <td className="px-5 py-3.5 text-right text-cyan-600 font-black">R$ {Number(p.preco).toFixed(2)}</td>
                            {isAdmin && <td className="px-5 py-3.5 text-right text-orange-500 font-bold text-xs">R$ {Number(p.preco_custo||0).toFixed(2)}</td>}
                            {isAdmin && <td className="px-5 py-3.5 text-right">
                              {mg ? <span className={`text-xs font-black px-2 py-0.5 rounded-full ${Number(mg) >= 30 ? "bg-emerald-100 text-emerald-600" : Number(mg) >= 15 ? "bg-yellow-100 text-yellow-600" : "bg-red-100 text-red-500"}`}>{mg}%</span> : <span className="text-gray-300 text-xs">—</span>}
                            </td>}
                            <td className={`px-5 py-3.5 text-right font-black ${Number(p.quantidade)<=5?"text-yellow-500":"text-gray-700"}`}>{p.quantidade}</td>
                            <td className="px-5 py-3.5">
                              <div className="flex justify-center gap-1.5">
                                <button onClick={() => abrirEditar(p)} title="Editar"
                                  className="w-8 h-8 rounded-full bg-cyan-50 text-cyan-500 hover:bg-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors">✏️</button>
                                <button onClick={() => excluir(p.codigo, p.nome)} title="Excluir"
                                  className="w-8 h-8 rounded-full bg-red-50 text-red-400 hover:bg-red-500 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })
                  }
                </tbody>
              </table>
            </div>
          </div>
          <Modal open={modal} onClose={() => setModal(false)} title={editando ? "Editar Produto" : "Novo Produto"}>
            <div className="flex flex-col gap-4">
              <Field label="Nome do Produto">
                <input className={inputCls} placeholder="Ex: Caderno Universitário" value={form.nome} onChange={f("nome")} />
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Preço de Venda (R$)">
                  <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={form.preco} onChange={f("preco")} />
                </Field>
                <Field label="Quantidade">
                  <input type="number" min="0" className={inputCls} placeholder="0" value={form.quantidade} onChange={f("quantidade")} />
                </Field>
              </div>
              {isAdmin && (
                <div>
                  <Field label="Preço de Custo (R$) 🔒 Admin">
                    <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={form.preco_custo} onChange={f("preco_custo")} />
                  </Field>
                  {margem() !== null && (
                    <p className="text-xs font-black mt-1.5 ml-1" style={{ color: Number(margem()) >= 30 ? "#059669" : Number(margem()) >= 15 ? "#d97706" : "#ef4444" }}>
                      Margem de lucro: {margem()}%
                    </p>
                  )}
                </div>
              )}
              <div className="bg-gray-50 rounded-xl p-3">
                <p className="text-gray-400 text-xs font-bold">Código (gerado automaticamente)</p>
                <p className="text-gray-700 font-mono font-black text-lg mt-1">{form.codigo}</p>
              </div>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={() => setModal(false)}
                className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 transition-colors text-sm">Cancelar</button>
              <button onClick={salvar} disabled={saving}

    function VendaInline({ produtos, setProdutos, setVendas, addToast, api, carrinho, setCarrinho, onVendaFinalizada, clientes }) {
      const [search,      setSearch]     = useState("");
      const [pagamento,   setPagamento]  = useState("dinheiro");
      const [desconto,    setDesconto]   = useState("");
      const [finalizando, setFinalizando]= useState(false);
      const [modoAvulso,  setModoAvulso] = useState(false);
      const [avulsoForm,  setAvulsoForm] = useState({ nome: "", qtd: "1", preco: "" });
      const [clienteSel,  setClienteSel] = useState("");
      const searchRef = useRef();

      const resultado = search
        ? produtos.filter(p => Number(p.quantidade) > 0 && [p.nome, p.codigo].some(v => v?.toLowerCase().includes(search.toLowerCase()))).slice(0, 6)
        : [];

      function addAoCarrinho(p) {
        setCarrinho(prev => {
          const ex = prev.find(i => i.codigo === p.codigo);
          if (ex) {
            const prod = produtos.find(pr => pr.codigo === p.codigo);
            if (ex.qtd >= Number(prod?.quantidade || 0)) { addToast("Estoque insuficiente.", "warn"); return prev; }
            return prev.map(i => i.codigo === p.codigo ? { ...i, qtd: i.qtd + 1 } : i);
          }
          return [...prev, { ...p, qtd: 1 }];
        });
        setSearch(""); searchRef.current?.focus();
      }

      function addAvulso() {
        if (!avulsoForm.nome.trim() || !avulsoForm.preco) return addToast("Preencha nome e preço.", "error");
        setCarrinho(prev => [...prev, { id: Date.now(), nome: avulsoForm.nome, preco: avulsoForm.preco, qtd: Number(avulsoForm.qtd) || 1, isAvulso: true }]);
        setAvulsoForm({ nome: "", qtd: "1", preco: "" });
      }

      function alterarQtd(key, delta) {
        setCarrinho(prev => prev.map(i => {
          if (i.codigo !== key && i.id !== key) return i;
          const nova = i.qtd + delta;
          if (nova < 1) return i;
          if (!i.isAvulso) {
            const prod = produtos.find(p => p.codigo === key);
            if (nova > Number(prod?.quantidade || 0)) { addToast("Estoque insuficiente.", "warn"); return i; }
          }
          return { ...i, qtd: nova };
        }));
      }

      const subtotal = carrinho.reduce((s, i) => s + Number(i.preco) * i.qtd, 0);
      const descVal  = Math.min(subtotal, Math.max(0, parseFloat(desconto) || 0));
      const total    = subtotal - descVal;

      async function finalizar() {
        if (carrinho.length === 0) return addToast("Carrinho vazio.", "error");
        setFinalizando(true);
        const venda = {
          data: new Date().toLocaleDateString("pt-BR"),
          hora: new Date().toLocaleTimeString("pt-BR"),
          itens: carrinho.map(i => `${i.nome}(${i.qtd})`).join(", "),
          subtotal: subtotal.toFixed(2),
          desconto: descVal.toFixed(2),
          total: total.toFixed(2),
          pagamento,
        };
        const res = await api.call("registrarVenda", { venda, carrinho });
        if (res.success) {
          setProdutos(prev => prev.map(p => {
            const item = carrinho.find(i => i.codigo === p.codigo);
            return item ? { ...p, quantidade: String(Number(p.quantidade) - item.qtd) } : p;
          }));
          setVendas(v => [...v, venda]);
          setCarrinho([]); setDesconto("");
          if (pagamento === "fiado") {
            const nomeCliente = clienteSel
              ? ((clientes || []).find(c => String(c.id) === String(clienteSel))?.nome || clienteSel)
              : "";
            if (clienteSel) {
              const dataISO = new Date().toISOString().split("T")[0];
              await api.call("addFiado", { fiado: { cliente_id: Number(clienteSel), descricao: venda.itens, valor_total: Number(venda.total), valor_pago: 0, data: dataISO } });
            }
            imprimirComprovanteAtivo({ nomeCliente, itens: venda.itens, subtotal: venda.subtotal, desconto: venda.desconto, total: venda.total, data: venda.data, hora: venda.hora });
          }
          addToast("Venda finalizada com sucesso! ✨");
          setClienteSel("");
          if (onVendaFinalizada) onVendaFinalizada();
        } else addToast(res.error || "Erro ao finalizar venda.", "error");
        setFinalizando(false);
      }

      return (
        <div className="flex flex-col gap-4">

          </div>

          {modoAvulso ? (
            <div className="bg-purple-50 border-2 border-purple-100 rounded-2xl p-4 flex flex-wrap gap-3">
              <input className={`${inputCls} flex-1 min-w-[140px]`} placeholder="Nome do produto"
                value={avulsoForm.nome} onChange={e => setAvulsoForm(f => ({...f, nome: e.target.value}))} />
              <input type="number" min="1" className={`${inputCls} w-20 text-center`} placeholder="Qtd"
                value={avulsoForm.qtd} onChange={e => setAvulsoForm(f => ({...f, qtd: e.target.value}))} />
              <input type="number" step="0.01" min="0" className={`${inputCls} w-28 text-center`} placeholder="R$ Preço"
                value={avulsoForm.preco} onChange={e => setAvulsoForm(f => ({...f, preco: e.target.value}))} />
              <button onClick={addAvulso} className="lift bg-purple-500 hover:bg-purple-400 text-white font-black px-6 py-2.5 rounded-2xl shadow-md w-full sm:w-auto">
                + Adicionar
              </button>

              <input ref={searchRef}
                className="field w-full bg-white border-2 border-gray-200 rounded-2xl px-5 py-3.5 text-gray-700 placeholder-gray-300 font-bold text-base"
                placeholder="Nome ou código do produto..."

              {resultado.length > 0 && (
                <div className="absolute top-full left-0 right-0 mt-2 bg-white border-2 border-pink-100 rounded-2xl z-20 shadow-xl overflow-hidden max-h-52 overflow-y-auto">
                  {resultado.map(p => (
                    <button key={p.codigo} onClick={() => addAoCarrinho(p)}
                      className="w-full flex justify-between items-center px-5 py-3 hover:bg-pink-50 transition-colors border-b border-gray-50 last:border-0 text-left">
                      <div>
                        <p className="text-gray-800 font-bold text-sm">{p.nome}</p>
                        <p className="text-gray-400 text-xs font-mono">{p.codigo} · {p.quantidade} em estoque</p>

                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          <div className="bg-gray-50 rounded-2xl border border-gray-100 max-h-48 overflow-y-auto">
            {carrinho.length === 0
              ? <div className="flex flex-col items-center justify-center gap-1 py-8 text-gray-300">
                  <span className="text-3xl">🛍️</span>
                  <p className="font-bold text-sm">Carrinho vazio</p>
                </div>
              : <div className="flex flex-col divide-y divide-gray-100">
                  {carrinho.map(i => (
                    <div key={i.codigo || i.id} className="flex items-center gap-3 px-4 py-2.5">
                      <div className="flex-1 min-w-0">
                        <p className="text-gray-800 font-bold text-xs truncate">{i.nome} {i.isAvulso && <span className="text-purple-400">(Avulso)</span>}</p>
                        <p className="text-gray-400 text-[10px]">R$ {Number(i.preco).toFixed(2)} un.</p>
                      </div>
                      <div className="flex items-center gap-1.5 shrink-0">
                        <button onClick={() => alterarQtd(i.codigo || i.id, -1)}

                        <span className="text-gray-800 font-black text-sm w-5 text-center">{i.qtd}</span>
                        <button onClick={() => alterarQtd(i.codigo || i.id, 1)}

                      </div>
                      <span className="text-cyan-600 font-black text-xs w-16 text-right shrink-0">R$ {(Number(i.preco)*i.qtd).toFixed(2)}</span>
                      <button onClick={() => setCarrinho(c => c.filter(x => (x.codigo || x.id) !== (i.codigo || i.id)))}

                    </div>

                </div>

          </div>

          <div className="flex flex-col gap-3">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-pink-600 font-bold text-xs block mb-1 ml-1">Pagamento</label>
                <select className="w-full bg-pink-50 border-2 border-pink-100 rounded-xl px-3 py-2.5 text-pink-700 text-sm font-bold focus:outline-none"
                  value={pagamento} onChange={e => { setPagamento(e.target.value); if (e.target.value !== "fiado") setClienteSel(""); }}>
                  <option value="dinheiro">💵 Dinheiro</option>

              <div>

    function Estoque({ produtos, setProdutos, addToast, api }) {
      const [codigo,  setCodigo]  = useState("");
      const [qtd,     setQtd]     = useState("");
      const [loading, setLoading] = useState(false);
      const [filtro,  setFiltro]  = useState("todos");

      async function repor() {
        if (!codigo.trim() || !qtd) return addToast("Informe o código e a quantidade.", "error");
        const prod = produtos.find(p => p.codigo === codigo.trim());
        if (!prod) return addToast("Produto não encontrado.", "error");
        if (isNaN(Number(qtd)) || Number(qtd) <= 0) return addToast("Quantidade inválida.", "error");
        setLoading(true);
        const novaQtd = String(Number(prod.quantidade) + Number(qtd));
        const res = await api.call("updateProduto", { produto: { ...prod, quantidade: novaQtd } });
        if (res.success) {
          setProdutos(prev => prev.map(p => p.codigo === codigo.trim() ? { ...p, quantidade: novaQtd } : p));
          addToast(`"${prod.nome}" reabastecido!`);
          setCodigo(""); setQtd("");
        } else addToast(res.error || "Erro ao atualizar.", "error");
        setLoading(false);
      }

      const filtrados = produtos.filter(p => {
        if (filtro === "ok")     return Number(p.quantidade) > 5;
        if (filtro === "baixo")  return Number(p.quantidade) > 0 && Number(p.quantidade) <= 5;
        if (filtro === "zero")   return Number(p.quantidade) === 0;
        return true;
      });

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <h1 className="text-2xl font-black text-gray-800">Controle de Estoque</h1>
          <div className="bg-white border-2 border-purple-100 rounded-3xl p-5 shadow-sm">

                value={codigo} onChange={e => setCodigo(e.target.value)} />
              <datalist id="prod-list">
                {produtos.map(p => <option key={p.codigo} value={p.codigo}>{p.nome}</option>)}
              </datalist>
              <input type="number" min="1" className={`${inputCls} w-28 text-center`}
                placeholder="+ Qtd" value={qtd} onChange={e => setQtd(e.target.value)} />
              <button onClick={repor} disabled={loading}
                className="lift bg-purple-500 hover:bg-purple-400 text-white font-black px-7 py-2.5 rounded-2xl shadow-md transition-all text-sm disabled:opacity-60">
                {loading ? "..." : "Repor"}
              </button>
            </div>
          </div>
          <div className="flex gap-2 flex-wrap">
            {[["todos","Todos","bg-gray-100 text-gray-600"],["ok","OK","bg-emerald-100 text-emerald-600"],["baixo","Acabando","bg-yellow-100 text-yellow-600"],["zero","Esgotado","bg-red-100 text-red-500"]].map(([v,l,cls]) => (
              <button key={v} onClick={() => setFiltro(v)}
                className={`px-4 py-2 rounded-full text-xs font-black transition-all ${filtro===v ? cls+" ring-2 ring-offset-1 ring-current" : "bg-gray-100 text-gray-400 hover:bg-gray-200"}`}>
                {l}
              </button>
            ))}

          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-purple-50 text-purple-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Produto</th>
                    <th className="px-5 py-4">Código</th>
                    <th className="px-5 py-4 text-center">Quantidade</th>
                    <th className="px-5 py-4 text-center">Status</th>

                    : filtrados.map(p => (

    function SaidasCaixa({ saidas, setSaidas, addToast, api }) {

      const [motivo, setMotivo] = useState("");
      const [loading, setLoading] = useState(false);

      async function registrar() {
        if (!valor || isNaN(Number(valor)) || Number(valor) <= 0) return addToast("Informe um valor válido.", "error");
        if (!motivo.trim()) return addToast("Informe o motivo.", "error");
        setLoading(true);
        const saida = {
          data: new Date().toLocaleDateString("pt-BR"),
          hora: new Date().toLocaleTimeString("pt-BR"),
          valor: Number(valor).toFixed(2),
          motivo: motivo.trim(),
        };
        const res = await api.call("addSaidaCaixa", { saida });
        if (res.success) {
          setSaidas(prev => [...prev, saida]);
          addToast("Saída registrada!");
          setValor(""); setMotivo("");
        } else addToast(res.error || "Erro ao registrar.", "error");
        setLoading(false);
      }

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">

              <div className="grid grid-cols-2 gap-3">

                <Field label="Motivo">

              <button onClick={registrar} disabled={loading}
                className="lift bg-red-500 hover:bg-red-400 text-white font-black rounded-2xl py-3 shadow-md transition-all text-sm disabled:opacity-60">
                {loading ? "Registrando..." : "Registrar Saída"}

    function Historico({ vendas, saidas, valorCaixa, caixaAberto, onFecharCaixa, setVendas, api, addToast }) {
      const [filtroData, setFiltroData] = useState("");
      const [filtroPag,  setFiltroPag]  = useState("todos");
      const [confirmando, setConfirmando] = useState(false);
      const [modalEdicao, setModalEdicao] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [salvando, setSalvando] = useState(false);
      const [saidasVisiveis, setSaidasVisiveis] = useState(saidas);
      const [carregandoSaidas, setCarregandoSaidas] = useState(false);
      const [valorCaixaFiltrado, setValorCaixaFiltrado] = useState(null);
      const [pagamentosFiado, setPagamentosFiado] = useState([]);

      // Busca pagamentos de fiado do dia (hoje ou data filtrada)
      async function buscarPagamentosFiado(dataISO) {
        try {
          const { data, error } = await sb.from("fiado_pagamentos")
            .select("*, fiado(descricao, clientes(nome))")
            .eq("data", dataISO)
            .order("data", { ascending: false });
          if (!error) setPagamentosFiado(data || []);
        } catch(e) { console.warn("Fiado pagamentos:", e); }
      }

      // Quando filtroData muda, busca saídas e caixa inicial da data selecionada
      useEffect(() => {
        if (!filtroData) {
          setSaidasVisiveis(saidas);
          setValorCaixaFiltrado(null);
          // busca fiado de hoje
          const d = new Date();
          const hoje = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
          buscarPagamentosFiado(hoje);
          return;
        }
        setCarregandoSaidas(true);
        Promise.all([
          api.call("getSaidasByData", { dataISO: filtroData }),
          api.call("getCaixaByData",  { dataISO: filtroData }),
        ]).then(([resSaidas, resCaixa]) => {
          setSaidasVisiveis(resSaidas.success ? (resSaidas.data || []) : []);
          setValorCaixaFiltrado(resCaixa.success && resCaixa.data ? Number(resCaixa.data.valorInicial) : 0);
          setCarregandoSaidas(false);
        });
        buscarPagamentosFiado(filtroData);
      }, [filtroData]);

      // Sincroniza quando saidas de hoje mudam (nova saída adicionada)
      useEffect(() => { if (!filtroData) setSaidasVisiveis(saidas); }, [saidas]);

      // Vendas filtradas por data + pagamento → usadas na tabela
      const filtradas = [...vendas].reverse().filter(v => {
        const okData = filtroData ? v.data === new Date(filtroData+"T00:00:00").toLocaleDateString("pt-BR") : true;
        const okPag  = filtroPag !== "todos" ? (v.pagamento||"").toLowerCase() === filtroPag : true;
        return okData && okPag;
      });

      // Vendas filtradas só por data → usadas nos cards e totais (independe do filtro de pagamento)
      const vendasDoDia = [...vendas].filter(v =>
        filtroData ? v.data === new Date(filtroData+"T00:00:00").toLocaleDateString("pt-BR") : true
      );

      const totalDinheiro  = vendasDoDia.filter(v => (v.pagamento||"").toLowerCase() === "dinheiro").reduce((s,v) => s + Number(v.total||0), 0);
      const totalPix       = vendasDoDia.filter(v => (v.pagamento||"").toLowerCase() === "pix").reduce((s,v) => s + Number(v.total||0), 0);
      const totalDebito    = vendasDoDia.filter(v => (v.pagamento||"").toLowerCase() === "debito").reduce((s,v) => s + Number(v.total||0), 0);
      const totalCredito   = vendasDoDia.filter(v => (v.pagamento||"").toLowerCase() === "credito").reduce((s,v) => s + Number(v.total||0), 0);
      const totalVendasDia = vendasDoDia.reduce((s,v) => s + Number(v.total||0), 0);
      const totalSaidasDia = saidasVisiveis.reduce((s,v) => s + Number(v.valor||0), 0);
      // Totais de recebimentos de fiado por forma
      const totalFiado         = pagamentosFiado.reduce((s,p) => s + Number(p.valor||0), 0);
      const fiadoDinheiro      = pagamentosFiado.filter(p => (p.forma_pagamento||"dinheiro") === "dinheiro").reduce((s,p) => s + Number(p.valor||0), 0);
      const fiadoPix           = pagamentosFiado.filter(p => (p.forma_pagamento||"") === "pix").reduce((s,p) => s + Number(p.valor||0), 0);
      const fiadoDebito        = pagamentosFiado.filter(p => (p.forma_pagamento||"") === "debito").reduce((s,p) => s + Number(p.valor||0), 0);
      const fiadoCredito       = pagamentosFiado.filter(p => (p.forma_pagamento||"") === "credito").reduce((s,p) => s + Number(p.valor||0), 0);
      // Valor inicial: quando filtrado usa o caixa da data; senão usa o caixa aberto atual
      const valorInicialAtivo = filtroData
        ? (valorCaixaFiltrado ?? 0)
        : (caixaAberto ? Number(valorCaixa||0) : 0);
      const saldoFinal = valorInicialAtivo + totalVendasDia + totalFiado - totalSaidasDia;

      function abrirEdicao(venda) {
        setEditForm({ pagamento: venda.pagamento || "dinheiro", desconto: venda.desconto || "0", subtotal: venda.subtotal || "0", total: venda.total || "0" });
        setModalEdicao({ venda });
      }

      async function salvarEdicao() {
        if (!modalEdicao) return;
        setSalvando(true);
        const novoTotal = (parseFloat(editForm.subtotal || 0) - parseFloat(editForm.desconto || 0)).toFixed(2);
        const vendaAtualizada = { ...modalEdicao.venda, pagamento: editForm.pagamento, desconto: parseFloat(editForm.desconto || 0).toFixed(2), subtotal: parseFloat(editForm.subtotal || 0).toFixed(2), total: novoTotal };
        const res = await api.call("updateVenda", { venda: vendaAtualizada });
        if (res.success) {
          setVendas(prev => prev.map(v => v._id === modalEdicao.venda._id ? vendaAtualizada : v));
          addToast("Venda atualizada com sucesso!");
          setModalEdicao(null);
        } else addToast(res.error || "Erro ao salvar.", "error");
        setSalvando(false);
      }

      async function cancelarVenda(venda) {
        if (!confirm(`Cancelar a venda de R$ ${Number(venda.total).toFixed(2)} (${venda.itens})?\n\nEssa ação remove o registro permanentemente.`)) return;
        const res = await api.call("deleteVenda", { venda });
        if (res.success) {
          setVendas(prev => prev.filter(v => v._id !== venda._id));
          addToast("Venda cancelada e removida.", "warn");
        } else addToast(res.error || "Erro ao cancelar.", "error");
      }

      // PDF de fechamento de caixa — usa apenas vendas de HOJE
      function gerarEImprimirPDF() {
        const hoje = new Date().toLocaleDateString("pt-BR");
        const vendasHoje = vendas.filter(v => v.data === hoje);
        const dinH = vendasHoje.filter(v => (v.pagamento||"").toLowerCase() === "dinheiro").reduce((s,v) => s + Number(v.total||0), 0);
        const pixH = vendasHoje.filter(v => (v.pagamento||"").toLowerCase() === "pix").reduce((s,v) => s + Number(v.total||0), 0);
        const debH = vendasHoje.filter(v => (v.pagamento||"").toLowerCase() === "debito").reduce((s,v) => s + Number(v.total||0), 0);
        const creH = vendasHoje.filter(v => (v.pagamento||"").toLowerCase() === "credito").reduce((s,v) => s + Number(v.total||0), 0);
        const totH = vendasHoje.reduce((s,v) => s + Number(v.total||0), 0);
        const totSaidasH = saidas.reduce((s,v) => s + Number(v.valor||0), 0);
        const saldoFech = Number(valorCaixa||0) + totH + totalFiado - totSaidasH;
        const grouped = { dinheiro:[], pix:[], debito:[], credito:[] };

        const lPag = { dinheiro:"💵 Dinheiro", pix:"📱 PIX", debito:"💳 Débito", credito:"💳 Crédito" };

                  <tbody className="font-semibold text-gray-600">

                        <td className="px-5 py-3 font-bold text-gray-800">{p.fiado?.clientes?.nome || "—"}</td>
                        <td className="px-5 py-3 text-gray-500 text-xs max-w-[160px] truncate">{p.fiado?.descricao || "—"}</td>
                        <td className="px-5 py-3 text-center">
                          <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold uppercase ${
                            (p.forma_pagamento||"dinheiro") === "dinheiro" ? "bg-green-100 text-green-700" :
                            p.forma_pagamento === "pix"     ? "bg-sky-100 text-sky-700"     :
                            p.forma_pagamento === "debito"  ? "bg-blue-100 text-blue-700"   :
                            p.forma_pagamento === "credito" ? "bg-indigo-100 text-indigo-700" :
                            "bg-gray-100 text-gray-600"
                          }`}>{p.forma_pagamento || "dinheiro"}</span>

                    ))}
                  </tbody>
                </table>

          )}

          {/* Filtros */}
          <div className="bg-white border-2 border-cyan-100 rounded-3xl p-4 shadow-sm flex flex-wrap gap-3 items-end">

            <button onClick={gerarPDFRelatorio} disabled={filtradas.length === 0}

              📄 Exportar PDF

          {/* Tabela de vendas */}
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="px-5 py-3 bg-cyan-50 border-b border-cyan-100 flex justify-between items-center">
              <h3 className="font-extrabold text-cyan-600 text-sm">Vendas Realizadas</h3>
              <span className="text-xs text-gray-400 font-bold">{filtradas.length} registro(s)</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-gray-50 text-gray-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Data / Hora</th>
                    <th className="px-5 py-4">Itens</th>
                    <th className="px-5 py-4 text-center">Desconto</th>
                    <th className="px-5 py-4 text-center">Pagamento</th>
                    <th className="px-5 py-4 text-right">Total</th>
                    <th className="px-4 py-4 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {filtradas.length === 0
                    ? <tr><td colSpan="6" className="text-center py-12 text-gray-300 font-bold">Nenhuma venda encontrada.</td></tr>
                    : filtradas.map((v, i) => (
                        <tr key={i} className="border-t border-gray-50 hover:bg-cyan-50/30 transition-colors">
                          <td className="px-5 py-3.5"><p className="font-bold text-gray-800">{v.data || ""}</p><p className="text-gray-400 text-xs">{v.hora || ""}</p></td>
                          <td className="px-5 py-3.5 text-gray-500 text-xs max-w-[180px] truncate" title={v.itens}>{v.itens || ""}</td>
                          <td className="px-5 py-3.5 text-center">{Number(v.desconto||0) > 0 ? <span className="text-purple-500 font-black text-xs">- R$ {Number(v.desconto).toFixed(2)}</span> : <span className="text-gray-300 text-xs">—</span>}</td>
                          <td className="px-5 py-3.5 text-center">
                            <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold uppercase ${
                              (v.pagamento||"").toLowerCase() === "dinheiro" ? "bg-green-100 text-green-700" :
                              (v.pagamento||"").toLowerCase() === "pix"      ? "bg-sky-100 text-sky-700"   :
                              (v.pagamento||"").toLowerCase() === "debito"   ? "bg-blue-100 text-blue-700"  :
                              (v.pagamento||"").toLowerCase() === "credito"  ? "bg-indigo-100 text-indigo-700" :
                              "bg-gray-100 text-gray-600"
                            }`}>{v.pagamento || ""}</span>
                          </td>
                          <td className="px-5 py-3.5 text-right text-cyan-600 font-black">R$ {Number(v.total||0).toFixed(2)}</td>
                          <td className="px-4 py-3.5">
                            <div className="flex justify-center gap-1.5">
                              <button onClick={() => abrirEdicao(v)} title="Editar"
                                className="w-8 h-8 rounded-full bg-cyan-50 hover:bg-cyan-500 text-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors">✏️</button>
                              <button onClick={() => cancelarVenda(v)} title="Cancelar"
                                className="w-8 h-8 rounded-full bg-red-50 hover:bg-red-500 text-red-400 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                            </div>
                          </td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal de edição */}
          {modalEdicao && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
                 onClick={e => e.target === e.currentTarget && setModalEdicao(null)}>
              <div className="animate-bounceIn bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
                <div className="flex items-center justify-between mb-5">
                  <h2 className="text-xl font-black text-cyan-500">Editar Venda</h2>
                  <button onClick={() => setModalEdicao(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:bg-gray-200 font-bold text-xl">✕</button>
                </div>
                <div className="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-4">
                  <p className="text-gray-400 text-[10px] font-black uppercase mb-1">Itens da venda</p>
                  <p className="text-gray-700 font-bold text-sm leading-snug">{modalEdicao.venda.itens}</p>
                  <p className="text-gray-400 text-xs mt-1">{modalEdicao.venda.data} às {modalEdicao.venda.hora}</p>
                </div>
                <div className="flex flex-col gap-4">
                  <div>
                    <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">Forma de Pagamento</label>
                    <select className={`${inputCls} w-full`} value={editForm.pagamento} onChange={e => setEditForm(f => ({...f, pagamento: e.target.value}))}>
                      <option value="dinheiro">💵 Dinheiro</option>
                      <option value="pix">📱 PIX</option>
                      <option value="debito">💳 Débito</option>
                      <option value="credito">💳 Crédito</option>
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">Subtotal (R$)</label>
                      <input type="number" step="0.01" min="0" className={inputCls} value={editForm.subtotal} onChange={e => setEditForm(f => ({...f, subtotal: e.target.value}))} />
                    </div>
                    <div>
                      <label className="text-gray-500 font-bold text-xs ml-1 block mb-1">Desconto (R$)</label>
                      <input type="number" step="0.01" min="0" className={inputCls} value={editForm.desconto} onChange={e => setEditForm(f => ({...f, desconto: e.target.value}))} />
                    </div>
                  </div>
                  <div className="flex items-center justify-between bg-cyan-50 border-2 border-cyan-100 px-5 py-3 rounded-2xl">
                    <span className="text-gray-600 font-bold text-sm">Total calculado</span>
                    <span className="text-2xl font-black text-cyan-500">R$ {Math.max(0, (parseFloat(editForm.subtotal||0) - parseFloat(editForm.desconto||0))).toFixed(2)}</span>
                  </div>
                </div>
                <div className="flex gap-3 mt-5">
                  <button onClick={() => setModalEdicao(null)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 transition-colors text-sm">Cancelar</button>
                  <button onClick={salvarEdicao} disabled={salvando} className="flex-1 lift bg-cyan-500 hover:bg-cyan-400 text-white font-black rounded-2xl py-3 shadow-md transition-all text-sm disabled:opacity-60">{salvando ? "Salvando..." : "Salvar Alterações"}</button>
                </div>
              </div>
            </div>
          )}

          {/* Tabela de saídas — filtrada pela data selecionada */}
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="px-5 py-3 bg-red-50 border-b border-red-100 flex justify-between items-center">
              <h3 className="font-extrabold text-red-500 text-sm">Saídas de Caixa</h3>
              {carregandoSaidas && <span className="text-xs text-gray-400 animate-pulse">Carregando...</span>}
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-gray-50 text-gray-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr><th className="px-5 py-4">Data / Hora</th><th className="px-5 py-4">Motivo</th><th className="px-5 py-4 text-right">Valor</th></tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {saidasVisiveis.length === 0
                    ? <tr><td colSpan="3" className="text-center py-12 text-gray-300 font-bold">Nenhuma saída registrada.</td></tr>
                    : [...saidasVisiveis].reverse().map((s, i) => (
                        <tr key={i} className="border-t border-gray-50 hover:bg-red-50/30 transition-colors">
                          <td className="px-5 py-3.5"><p className="font-bold text-gray-800">{s.data}</p><p className="text-gray-400 text-xs">{s.hora}</p></td>
                          <td className="px-5 py-3.5 text-gray-600 font-semibold">{s.motivo}</td>
                          <td className="px-5 py-3.5 text-right text-red-500 font-black">- R$ {Number(s.valor).toFixed(2)}</td>
                        </tr>
                      ))

              </table>
            </div>
