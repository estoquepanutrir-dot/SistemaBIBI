    // ── Boletos ──────────────────────────────────────────────────
    function Boletos({ api, addToast }) {
      const [lista,    setLista]    = useState([]);
      const [modal,    setModal]    = useState(false);
      const [editando, setEditando] = useState(null);
      const [form,     setForm]     = useState({ fornecedor:"", valor:"", data_emissao:"", data_vencimento:"", status:"pendente", observacoes:"" });
      const [saving,   setSaving]   = useState(false);
      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

      useEffect(() => {
        api.call("getBoletos").then(r => { if (r.success) setLista(r.data || []); });
      }, []);

      function abrirNovo()    { setEditando(null); setForm({ fornecedor:"", valor:"", data_emissao: new Date().toISOString().split("T")[0], data_vencimento:"", status:"pendente", observacoes:"" }); setModal(true); }
      function abrirEditar(b) { setEditando(b.id); setForm({ fornecedor:b.fornecedor, valor:b.valor, data_emissao:b.data_emissao, data_vencimento:b.data_vencimento, status:b.status, observacoes:b.observacoes||"" }); setModal(true); }

      async function salvar() {
        if (!form.fornecedor.trim()) return addToast("Informe o fornecedor.", "error");
        if (!form.valor || isNaN(Number(form.valor))) return addToast("Valor inválido.", "error");
        if (!form.data_vencimento) return addToast("Informe a data de vencimento.", "error");
        setSaving(true);
        const dados = { ...form, valor: Number(form.valor) };
        if (editando) {
          const r = await api.call("updateBoleto", { id: editando, dados });
          if (r.success) { setLista(l => l.map(b => b.id === editando ? { ...b, ...dados } : b)); addToast("Boleto atualizado!"); setModal(false); }
          else addToast(r.error || "Erro.", "error");
        } else {
          const r = await api.call("addBoleto", { boleto: dados });
          if (r.success) { const r2 = await api.call("getBoletos"); if (r2.success) setLista(r2.data || []); addToast("Boleto cadastrado!"); setModal(false); }
          else addToast(r.error || "Erro.", "error");
        }
        setSaving(false);
      }

      async function excluir(id) {
        if (!confirm("Excluir este boleto?")) return;
        const r = await api.call("deleteBoleto", { id });
        if (r.success) { setLista(l => l.filter(b => b.id !== id)); addToast("Boleto excluído."); }
        else addToast(r.error || "Erro.", "error");
      }

      async function marcarPago(b) {
        const r = await api.call("updateBoleto", { id: b.id, dados: { ...b, status:"pago" } });
        if (r.success) { setLista(l => l.map(x => x.id === b.id ? { ...x, status:"pago" } : x)); addToast("Marcado como pago!"); }
      }

      const hoje = new Date();
      const statusBoleto = (b) => {
        if (b.status === "pago") return { label:"Pago", cls:"bg-emerald-100 text-emerald-600" };
        const venc = new Date(b.data_vencimento + "T00:00:00");
        const diff = Math.ceil((venc - hoje) / 86400000);
        if (diff < 0)  return { label:`Vencido (${Math.abs(diff)}d)`, cls:"bg-red-100 text-red-600" };
        if (diff <= 3) return { label:`Vence em ${diff}d`, cls:"bg-orange-100 text-orange-600" };
        return { label:"Pendente", cls:"bg-yellow-100 text-yellow-600" };
      };

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex items-center justify-between">
            <h1 className="text-2xl font-black text-gray-800">Boletos / Contas a Pagar</h1>
            <button onClick={abrirNovo} className="lift flex items-center gap-2 bg-orange-500 hover:bg-orange-400 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md text-sm">+ Novo Boleto</button>
          </div>
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-orange-50 text-orange-500 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Fornecedor</th>
                    <th className="px-5 py-4 text-right">Valor</th>
                    <th className="px-5 py-4 text-center">Emissão</th>
                    <th className="px-5 py-4 text-center">Vencimento</th>
                    <th className="px-5 py-4 text-center">Status</th>
                    <th className="px-5 py-4 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {lista.length === 0
                    ? <tr><td colSpan="6" className="text-center py-12 text-gray-300 font-bold">Nenhum boleto cadastrado.</td></tr>
                    : lista.map(b => {
                        const st = statusBoleto(b);
                        return (
                          <tr key={b.id} className="border-t border-gray-50 hover:bg-orange-50/30 transition-colors">
                            <td className="px-5 py-3.5 font-bold text-gray-800">{b.fornecedor}</td>
                            <td className="px-5 py-3.5 text-right text-orange-600 font-black">R$ {Number(b.valor).toFixed(2)}</td>
                            <td className="px-5 py-3.5 text-center text-gray-500 text-xs">{b.data_emissao}</td>
                            <td className="px-5 py-3.5 text-center text-gray-700 font-bold text-xs">{b.data_vencimento}</td>
                            <td className="px-5 py-3.5 text-center"><span className={`text-[10px] px-2.5 py-1 rounded-full font-black ${st.cls}`}>{st.label}</span></td>
                            <td className="px-5 py-3.5">
                              <div className="flex justify-center gap-1.5">
                                {b.status !== "pago" && <button onClick={() => marcarPago(b)} title="Marcar como pago" className="w-8 h-8 rounded-full bg-emerald-50 hover:bg-emerald-500 text-emerald-500 hover:text-white flex items-center justify-center text-sm transition-colors">✓</button>}
                                <button onClick={() => abrirEditar(b)} title="Editar" className="w-8 h-8 rounded-full bg-cyan-50 hover:bg-cyan-500 text-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors">✏️</button>
                                <button onClick={() => excluir(b.id)} title="Excluir" className="w-8 h-8 rounded-full bg-red-50 hover:bg-red-500 text-red-400 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })
                  }
                </tbody>
              </table>
            </div>
          </div>
          <Modal open={modal} onClose={() => setModal(false)} title={editando ? "Editar Boleto" : "Novo Boleto"} wide>
            <div className="flex flex-col gap-4">
              <Field label="Fornecedor"><input className={inputCls} placeholder="Nome do fornecedor" value={form.fornecedor} onChange={f("fornecedor")} /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Valor (R$)"><input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={form.valor} onChange={f("valor")} /></Field>
                <Field label="Status">
                  <select className={inputCls} value={form.status} onChange={f("status")}>
                    <option value="pendente">Pendente</option>
                    <option value="pago">Pago</option>
                  </select>
                </Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Data de Emissão"><input type="date" className={inputCls} value={form.data_emissao} onChange={f("data_emissao")} /></Field>
                <Field label="Data de Vencimento"><input type="date" className={inputCls} value={form.data_vencimento} onChange={f("data_vencimento")} /></Field>
              </div>
              <Field label="Observações"><textarea className={inputCls} rows="2" placeholder="Observações..." value={form.observacoes} onChange={f("observacoes")} /></Field>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={() => setModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 text-sm">Cancelar</button>
              <button onClick={salvar} disabled={saving} className="flex-1 lift bg-orange-500 hover:bg-orange-400 text-white font-black rounded-2xl py-3 shadow-md text-sm disabled:opacity-60">{saving ? "Salvando..." : "Salvar"}</button>
            </div>
          </Modal>
        </div>
      );
    }

    // ── Clientes + Fiado ─────────────────────────────────────────
    function Clientes({ api, addToast, clientes, setClientes }) {
      const lista = clientes || [];
      const setLista = setClientes;
      const [modal,        setModal]        = useState(false);
      const [modalFiado,   setModalFiado]   = useState(null); // cliente selecionado
      const [fiadoLista,   setFiadoLista]   = useState([]);
      const [editando,     setEditando]     = useState(null);
      const [form,         setForm]         = useState({ nome:"", telefone:"", cpf:"" });
      const [pagForm,      setPagForm]      = useState({ fiado_id:"", valor:"", data: new Date().toISOString().split("T")[0], observacoes:"", forma_pagamento:"dinheiro" });
      const [saving,       setSaving]       = useState(false);
      const [savingPag,    setSavingPag]    = useState(false);
      const [search,       setSearch]       = useState("");
      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

      async function abrirFiado(cliente) {
        setModalFiado(cliente);
        const r = await api.call("getFiadoCliente", { clienteId: cliente.id });
        if (r.success) setFiadoLista(r.data || []);
      }

      function abrirNovo()    { setEditando(null); setForm({ nome:"", telefone:"", cpf:"" }); setModal(true); }
      function abrirEditar(c) { setEditando(c.id); setForm({ nome:c.nome, telefone:c.telefone||"", cpf:c.cpf||"" }); setModal(true); }

      async function salvar() {
        if (!form.nome.trim()) return addToast("Nome é obrigatório.", "error");
        setSaving(true);
        if (editando) {
          const r = await api.call("updateCliente", { id: editando, dados: form });
          if (r.success) { setLista(l => l.map(c => c.id === editando ? { ...c, ...form } : c)); addToast("Cliente atualizado!"); setModal(false); }
          else addToast(r.error || "Erro.", "error");
        } else {
          const r = await api.call("addCliente", { cliente: form });
          if (r.success) { setLista(l => [...l, r.data]); addToast("Cliente cadastrado!"); setModal(false); }
          else addToast(r.error || "Erro.", "error");
        }
        setSaving(false);
      }

      async function excluir(id) {
        if (!confirm("Excluir este cliente?")) return;
        const r = await api.call("deleteCliente", { id });
        if (r.success) { setLista(l => l.filter(c => c.id !== id)); addToast("Cliente excluído."); }
        else addToast(r.error || "Erro.", "error");
      }

      async function registrarPagamento() {
        if (!pagForm.fiado_id) return addToast("Selecione uma dívida.", "error");
        if (!pagForm.valor || Number(pagForm.valor) <= 0) return addToast("Valor inválido.", "error");
        setSavingPag(true);
        const r = await api.call("addFiadoPagamento", { pagamento: { fiado_id: Number(pagForm.fiado_id), valor: Number(pagForm.valor), data: pagForm.data, observacoes: pagForm.observacoes, forma_pagamento: pagForm.forma_pagamento } });
        if (r.success) {
          const r2 = await api.call("getFiadoCliente", { clienteId: modalFiado.id });
          if (r2.success) setFiadoLista(r2.data || []);
          setPagForm({ fiado_id:"", valor:"", data: new Date().toISOString().split("T")[0], observacoes:"", forma_pagamento:"dinheiro" });
          addToast("Pagamento registrado!");
        } else addToast(r.error || "Erro.", "error");
        setSavingPag(false);
      }

      const filtrados = lista.filter(c => c.nome?.toLowerCase().includes(search.toLowerCase()) || c.telefone?.includes(search));

      const saldoDevedor = fiadoLista.reduce((s, f) => s + Math.max(0, Number(f.valor_total) - Number(f.valor_pago)), 0);
      const fiadoAberto  = fiadoLista.filter(f => Number(f.valor_pago) < Number(f.valor_total));

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex items-center justify-between">
            <h1 className="text-2xl font-black text-gray-800">Clientes</h1>
            <button onClick={abrirNovo} className="lift flex items-center gap-2 bg-teal-500 hover:bg-teal-400 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md text-sm">+ Novo Cliente</button>
          </div>
          <div className="relative">
            <span className="absolute left-4 top-3.5 text-gray-300 text-lg select-none">🔍</span>
            <input className="field w-full bg-white border-2 border-gray-200 rounded-2xl pl-12 pr-4 py-3 text-gray-700 placeholder-gray-300 font-semibold shadow-sm"
              placeholder="Pesquisar por nome ou telefone..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="bg-white border-2 border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-teal-50 text-teal-600 font-extrabold uppercase text-[10px] tracking-wider">
                  <tr>
                    <th className="px-5 py-4">Nome</th>
                    <th className="px-5 py-4">Telefone</th>
                    <th className="px-5 py-4">CPF</th>
                    <th className="px-5 py-4 text-center">Ações</th>
                  </tr>
                </thead>
                <tbody className="font-semibold text-gray-600">
                  {filtrados.length === 0
                    ? <tr><td colSpan="4" className="text-center py-12 text-gray-300 font-bold">Nenhum cliente encontrado.</td></tr>
                    : filtrados.map(c => (
                        <tr key={c.id} className="border-t border-gray-50 hover:bg-teal-50/30 transition-colors">
                          <td className="px-5 py-3.5 font-bold text-gray-800">{c.nome}</td>
                          <td className="px-5 py-3.5 text-gray-500 text-xs">{c.telefone || "—"}</td>
                          <td className="px-5 py-3.5 text-gray-500 text-xs font-mono">{c.cpf || "—"}</td>
                          <td className="px-5 py-3.5">
                            <div className="flex justify-center gap-1.5">
                              <button onClick={() => abrirFiado(c)} title="Ver Fiado" className="w-8 h-8 rounded-full bg-orange-50 hover:bg-orange-500 text-orange-500 hover:text-white flex items-center justify-center text-sm transition-colors">📒</button>
                              <button onClick={() => abrirEditar(c)} title="Editar" className="w-8 h-8 rounded-full bg-cyan-50 hover:bg-cyan-500 text-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors">✏️</button>
                              <button onClick={() => excluir(c.id)} title="Excluir" className="w-8 h-8 rounded-full bg-red-50 hover:bg-red-500 text-red-400 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                            </div>
                          </td>
                        </tr>
                      ))
                  }
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal cadastro/edição de cliente */}
          <Modal open={modal} onClose={() => setModal(false)} title={editando ? "Editar Cliente" : "Novo Cliente"}>
            <div className="flex flex-col gap-4">
              <Field label="Nome"><input className={inputCls} placeholder="Nome completo" value={form.nome} onChange={f("nome")} /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Telefone"><input className={inputCls} placeholder="(00) 00000-0000" value={form.telefone} onChange={f("telefone")} /></Field>
                <Field label="CPF"><input className={inputCls} placeholder="000.000.000-00" value={form.cpf} onChange={f("cpf")} /></Field>
              </div>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={() => setModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 text-sm">Cancelar</button>
              <button onClick={salvar} disabled={saving} className="flex-1 lift bg-teal-500 hover:bg-teal-400 text-white font-black rounded-2xl py-3 shadow-md text-sm disabled:opacity-60">{saving ? "Salvando..." : "Salvar"}</button>
            </div>
          </Modal>

          {/* Modal fiado do cliente */}
          {modalFiado && ReactDOM.createPortal(
            <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",overflowY:"auto"}}
                 onClick={e => e.target === e.currentTarget && setModalFiado(null)}>
              <div style={{width:"100%",maxWidth:"520px",maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
                <div className="animate-bounceIn bg-white rounded-3xl w-full shadow-2xl" style={{display:"flex",flexDirection:"column",maxHeight:"90vh"}}>
                  {/* Header */}
                  <div className="flex items-center justify-between px-6 py-5 border-b-2 border-gray-100" style={{flexShrink:0}}>
                    <div className="flex items-center gap-3">
                      <div className="w-11 h-11 bg-orange-100 rounded-2xl flex items-center justify-center text-xl">📒</div>
                      <div>
                        <h2 className="text-lg font-black text-gray-800">{modalFiado.nome}</h2>
                        {saldoDevedor > 0
                          ? <p className="text-red-500 font-bold text-xs mt-0.5">Saldo devedor: R$ {saldoDevedor.toFixed(2)}</p>
                          : <p className="text-emerald-500 font-bold text-xs mt-0.5">Tudo quitado ✓</p>}
                      </div>
                    </div>
                    <button onClick={() => setModalFiado(null)} className="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 font-bold text-lg transition-colors">✕</button>
                  </div>

                  {/* Body scrollable */}
                  <div style={{flex:1,overflowY:"auto",padding:"20px",display:"flex",flexDirection:"column",gap:"16px"}}>
                    {/* Histórico de dívidas */}
                    <div>
                      <p className="text-gray-400 font-black text-[10px] uppercase tracking-widest mb-2">Histórico de Dívidas</p>
                      <div className="flex flex-col gap-2">
                        {fiadoLista.length === 0
                          ? <div className="text-gray-400 text-sm font-semibold text-center py-6 bg-gray-50 rounded-2xl">Nenhuma dívida registrada.</div>
                          : fiadoLista.map(fi => {
                              const saldo = Number(fi.valor_total) - Number(fi.valor_pago);
                              const quitado = saldo <= 0;
                              return (
                                <div key={fi.id} className={`rounded-2xl px-4 py-3 border-2 ${quitado ? "border-emerald-100 bg-emerald-50" : "border-orange-100 bg-orange-50"}`}>
                                  <div className="flex justify-between items-center">
                                    <div className="flex-1 min-w-0 mr-3">
                                      <p className="text-gray-700 font-bold text-sm leading-snug truncate">{fi.descricao}</p>
                                      <p className="text-gray-400 text-[10px] mt-0.5">{fi.data}</p>
                                    </div>
                                    <div className="text-right shrink-0">
                                      <p className="text-gray-800 font-black text-sm">R$ {Number(fi.valor_total).toFixed(2)}</p>
                                      <p className={`text-xs font-bold ${quitado ? "text-emerald-500" : "text-red-500"}`}>{quitado ? "Quitado ✓" : `Deve: R$ ${saldo.toFixed(2)}`}</p>
                                    </div>
                                  </div>
                                </div>
                              );
                            })
                        }
                      </div>
                    </div>

                    {/* Registrar pagamento */}
                    {fiadoAberto.length > 0 && (
                      <div className="bg-gray-50 border-2 border-gray-100 rounded-3xl p-4 flex flex-col gap-3">
                        <div className="flex items-center justify-between">
                          <p className="text-gray-700 font-extrabold text-sm">💳 Registrar Pagamento</p>
                          {saldoDevedor > 0 && (
                            <button
                              onClick={() => { const fi = fiadoAberto[0]; setPagForm(p => ({ ...p, fiado_id: String(fi.id), valor: saldoDevedor.toFixed(2) })); }}
                              className="text-[11px] font-black bg-red-50 hover:bg-red-100 text-red-500 border border-red-200 px-3 py-1 rounded-full transition-colors">
                              💸 Pagar tudo (R$ {saldoDevedor.toFixed(2)})
                            </button>
                          )}
                        </div>

                        <Field label="Dívida">
                          <select className={inputCls} value={pagForm.fiado_id}
                            onChange={e => {
                              const fi = fiadoAberto.find(x => String(x.id) === e.target.value);
                              setPagForm(p => ({ ...p, fiado_id: e.target.value, valor: fi ? (Number(fi.valor_total)-Number(fi.valor_pago)).toFixed(2) : p.valor }));
                            }}>
                            <option value="">Selecionar dívida...</option>
                            {fiadoAberto.map(fi => <option key={fi.id} value={fi.id}>{fi.descricao?.substring(0,30)} — R$ {(Number(fi.valor_total)-Number(fi.valor_pago)).toFixed(2)}</option>)}
                          </select>
                        </Field>

                        {/* Forma de pagamento */}
                        <div>
                          <label className="text-gray-500 font-bold text-xs ml-1 block mb-2">Forma de Pagamento</label>
                          <div className="grid grid-cols-4 gap-2">
                            {[
                              { key:"dinheiro", label:"Dinheiro", icon:"💵", active:"bg-green-500 border-green-500 text-white shadow-md", inactive:"bg-white border-gray-200 text-gray-600 hover:border-green-300" },
                              { key:"pix",      label:"PIX",      icon:"📱", active:"bg-sky-500 border-sky-500 text-white shadow-md",   inactive:"bg-white border-gray-200 text-gray-600 hover:border-sky-300"  },
                              { key:"debito",   label:"Débito",   icon:"💳", active:"bg-blue-500 border-blue-500 text-white shadow-md", inactive:"bg-white border-gray-200 text-gray-600 hover:border-blue-300" },
                              { key:"credito",  label:"Crédito",  icon:"💳", active:"bg-indigo-500 border-indigo-500 text-white shadow-md",inactive:"bg-white border-gray-200 text-gray-600 hover:border-indigo-300"},
                            ].map(opt => (
                              <button key={opt.key} type="button"
                                onClick={() => setPagForm(p => ({ ...p, forma_pagamento: opt.key }))}
                                className={`flex flex-col items-center gap-1.5 py-3 px-1 rounded-2xl border-2 font-bold text-[11px] transition-all ${pagForm.forma_pagamento === opt.key ? opt.active : opt.inactive}`}>
                                <span className="text-lg">{opt.icon}</span>
                                {opt.label}
                              </button>
                            ))}
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                          <Field label="Valor (R$)">
                            <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={pagForm.valor} onChange={e => setPagForm(p => ({ ...p, valor: e.target.value }))} />
                          </Field>
                          <Field label="Data">
                            <input type="date" className={inputCls} value={pagForm.data} onChange={e => setPagForm(p => ({ ...p, data: e.target.value }))} />
                          </Field>
                        </div>

                        <button onClick={registrarPagamento} disabled={savingPag}
                          className="lift w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black rounded-2xl py-3.5 shadow-md transition-all text-sm disabled:opacity-60">
                          {savingPag ? "Registrando..." : "✓ Confirmar Pagamento"}
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>,
            document.body
          )}
        </div>
      );
    }

    // ── Datas Comemorativas ───────────────────────────────────────
    function DatasComem({ api, addToast }) {
      const [lista,    setLista]    = useState([]);
      const [modal,    setModal]    = useState(false);
      const [editando, setEditando] = useState(null);
      const [form,     setForm]     = useState({ nome:"", mes:"1", dia:"1", anotacao:"" });
      const [saving,   setSaving]   = useState(false);
      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

      useEffect(() => { api.call("getDatas").then(r => { if (r.success) setLista(r.data || []); }); }, []);

      function abrirNovo()    { setEditando(null); setForm({ nome:"", mes:"1", dia:"1", anotacao:"" }); setModal(true); }
      function abrirEditar(d) { setEditando(d.id); setForm({ nome:d.nome, mes:String(d.mes), dia:String(d.dia), anotacao:d.anotacao||"" }); setModal(true); }

      async function salvar() {
        if (!form.nome.trim()) return addToast("Informe o nome da data.", "error");
        setSaving(true);
        const dados = { nome: form.nome, mes: Number(form.mes), dia: Number(form.dia), anotacao: form.anotacao };
        if (editando) {
          const r = await api.call("updateData", { id: editando, dados });
          if (r.success) { setLista(l => l.map(d => d.id === editando ? { ...d, ...dados } : d)); addToast("Data atualizada!"); setModal(false); }
          else addToast(r.error || "Erro.", "error");
        } else {
          const r = await api.call("addData", { data: dados });
          if (r.success) { const r2 = await api.call("getDatas"); if (r2.success) setLista(r2.data||[]); addToast("Data cadastrada!"); setModal(false); }
          else addToast(r.error || "Erro.", "error");
        }
        setSaving(false);
      }

      async function excluir(id) {
        if (!confirm("Excluir esta data?")) return;
        const r = await api.call("deleteData", { id });
        if (r.success) { setLista(l => l.filter(d => d.id !== id)); addToast("Data excluída."); }
        else addToast(r.error || "Erro.", "error");
      }

      const agora = new Date();
      const anoAtual = agora.getFullYear();
      const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

      const comDias = lista.map(d => {
        let dataEvento = new Date(anoAtual, d.mes - 1, d.dia);
        if (dataEvento < agora) dataEvento.setFullYear(anoAtual + 1);
        const diff = Math.ceil((dataEvento - agora) / 86400000);
        return { ...d, diasRestantes: diff };
      }).sort((a, b) => a.diasRestantes - b.diasRestantes);

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex items-center justify-between">
            <h1 className="text-2xl font-black text-gray-800">Datas Comemorativas</h1>
            <button onClick={abrirNovo} className="lift flex items-center gap-2 bg-purple-500 hover:bg-purple-400 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md text-sm">+ Nova Data</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {comDias.map(d => (
              <div key={d.id} className={`bg-white border-2 rounded-3xl p-4 shadow-sm ${d.diasRestantes <= 7 ? "border-purple-200" : "border-gray-100"}`}>
                <div className="flex justify-between items-start">
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xl">{d.diasRestantes === 0 ? "🎉" : d.diasRestantes <= 7 ? "⚡" : "📅"}</span>
                      <p className="font-black text-gray-800 text-base">{d.nome}</p>
                    </div>
                    <p className="text-gray-400 font-bold text-xs">{String(d.dia).padStart(2,"0")}/{String(d.mes).padStart(2,"0")} — {meses[d.mes-1]}</p>
                    {d.diasRestantes <= 7 && <p className="text-purple-500 font-black text-xs mt-1">{d.diasRestantes === 0 ? "Hoje!" : `Faltam ${d.diasRestantes} dias`}</p>}
                    {d.anotacao && <p className="text-gray-500 text-xs mt-2 bg-gray-50 px-3 py-2 rounded-xl">{d.anotacao}</p>}
                  </div>
                  <div className="flex gap-1 ml-3 shrink-0">
                    <button onClick={() => abrirEditar(d)} className="w-8 h-8 rounded-full bg-cyan-50 hover:bg-cyan-500 text-cyan-500 hover:text-white flex items-center justify-center text-sm transition-colors">✏️</button>
                    <button onClick={() => excluir(d.id)} className="w-8 h-8 rounded-full bg-red-50 hover:bg-red-500 text-red-400 hover:text-white flex items-center justify-center text-sm transition-colors">🗑️</button>
                  </div>
                </div>
              </div>
            ))}
            {lista.length === 0 && <div className="col-span-2 text-center py-12 text-gray-300 font-bold">Nenhuma data cadastrada.</div>}
          </div>
          <Modal open={modal} onClose={() => setModal(false)} title={editando ? "Editar Data" : "Nova Data Comemorativa"}>
            <div className="flex flex-col gap-4">
              <Field label="Nome da Data"><input className={inputCls} placeholder="Ex: Dia das Mães" value={form.nome} onChange={f("nome")} /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Mês">
                  <select className={inputCls} value={form.mes} onChange={f("mes")}>
                    {meses.map((m, i) => <option key={i} value={i+1}>{m}</option>)}
                  </select>
                </Field>
                <Field label="Dia"><input type="number" min="1" max="31" className={inputCls} value={form.dia} onChange={f("dia")} /></Field>
              </div>
              <Field label="Anotação de Planejamento"><textarea className={inputCls} rows="2" placeholder="Ideias de promoções..." value={form.anotacao} onChange={f("anotacao")} /></Field>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={() => setModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl py-3 text-sm">Cancelar</button>
              <button onClick={salvar} disabled={saving} className="flex-1 lift bg-purple-500 hover:bg-purple-400 text-white font-black rounded-2xl py-3 shadow-md text-sm disabled:opacity-60">{saving ? "Salvando..." : "Salvar"}</button>
            </div>
          </Modal>
        </div>
      );
    }

    // ── Meta Oculta (Admin) ───────────────────────────────────────
    function MetaAdmin({ api, addToast, vendas }) {
      const agora = new Date();
      const mes   = agora.getMonth() + 1;
      const ano   = agora.getFullYear();
      const [meta,    setMeta]    = useState(null);
      const [form,    setForm]    = useState("");
      const [saving,  setSaving]  = useState(false);
      const [editando,setEditando]= useState(false);

      useEffect(() => {
        api.call("getMeta", { mes, ano }).then(r => {
          if (r.success && r.data) { setMeta(r.data); setForm(String(r.data.valor)); }
        });
      }, []);

      const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

      const vendasMes = vendas.filter(v => {
        if (!v.data) return false;
        const [, m, a] = v.data.split("/");
        return Number(m) === mes && Number(a) === ano;
      });
      const totalMes = vendasMes.reduce((s, v) => s + Number(v.total || 0), 0);
      const progresso = meta ? Math.min(100, (totalMes / Number(meta.valor)) * 100) : 0;

      async function salvarMeta() {
        if (!form || isNaN(Number(form)) || Number(form) <= 0) return addToast("Valor inválido.", "error");
        setSaving(true);
        const r = await api.call("setMeta", { mes, ano, valor: Number(form) });
        if (r.success) {
          setMeta({ mes, ano, valor: Number(form) });
          addToast("Meta salva com sucesso!"); setEditando(false);
        } else addToast(r.error || "Erro.", "error");
        setSaving(false);
      }

      return (
        <div className="flex flex-col gap-5 animate-fadeIn">
          <div className="flex items-center gap-3">
            <h1 className="text-2xl font-black text-gray-800">Meta de Vendas</h1>
            <span className="bg-indigo-100 text-indigo-600 text-xs font-black px-3 py-1 rounded-full">🔒 Admin</span>
          </div>

          <div className="bg-white border-2 border-indigo-100 rounded-3xl p-6 shadow-sm">
            <div className="flex justify-between items-center mb-2">
              <h2 className="font-extrabold text-indigo-600 text-lg">{meses[mes-1]} / {ano}</h2>
              {!editando && <button onClick={() => setEditando(true)} className="text-sm font-bold text-indigo-400 hover:text-indigo-600">{meta ? "Alterar meta" : "Definir meta"}</button>}
            </div>

            {editando ? (
              <div className="flex gap-3 mt-3">
                <input type="number" step="0.01" min="0" className={`${inputCls} flex-1`} placeholder="Ex: 10000.00" value={form} onChange={e => setForm(e.target.value)} />
                <button onClick={salvarMeta} disabled={saving} className="lift bg-indigo-500 hover:bg-indigo-400 text-white font-black px-5 py-2.5 rounded-2xl shadow-md text-sm disabled:opacity-60">{saving ? "Salvando..." : "Salvar"}</button>
                <button onClick={() => setEditando(false)} className="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold px-4 py-2.5 rounded-2xl text-sm">Cancelar</button>
              </div>
            ) : !meta ? (
              <p className="text-gray-400 font-semibold text-sm mt-2">Nenhuma meta definida para este mês.</p>
            ) : (
              <div className="mt-4">
                <div className="flex justify-between text-sm font-bold mb-2">
                  <span className="text-gray-600">R$ {totalMes.toFixed(2)} arrecadados</span>
                  <span className="text-indigo-600">Meta: R$ {Number(meta.valor).toFixed(2)}</span>
                </div>
                <div className="h-6 bg-indigo-50 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-700 flex items-center justify-end pr-2"
                    style={{ width: `${progresso}%`, background: progresso >= 100 ? "#059669" : progresso >= 70 ? "#6366f1" : "#f59e0b", minWidth: progresso > 0 ? "28px" : "0" }}>
                    {progresso > 8 && <span className="text-white text-[10px] font-black">{progresso.toFixed(0)}%</span>}
                  </div>
                </div>
                {progresso >= 100
                  ? <p className="text-emerald-500 font-black text-sm mt-2 text-center">🎉 Meta atingida! Parabéns!</p>
                  : <p className="text-gray-400 text-xs font-bold mt-2 text-center">Faltam R$ {(Number(meta.valor) - totalMes).toFixed(2)} para atingir a meta</p>
                }
              </div>
            )}
          </div>

          <div className="bg-white border-2 border-gray-100 rounded-3xl p-5 shadow-sm">
            <h3 className="font-extrabold text-gray-600 mb-4 text-sm">Vendas do Mês — {meses[mes-1]}</h3>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              {[
                { label:"Total de Vendas", val:`R$ ${totalMes.toFixed(2)}`, color:"text-cyan-600", bg:"bg-cyan-50" },
                { label:"Qtd. Transações", val:vendasMes.length, color:"text-pink-500", bg:"bg-pink-50" },
                { label:"Ticket Médio",    val:`R$ ${vendasMes.length ? (totalMes/vendasMes.length).toFixed(2) : "0.00"}`, color:"text-purple-600", bg:"bg-purple-50" },
                { label:"Progresso Meta",  val:`${progresso.toFixed(1)}%`, color:"text-indigo-600", bg:"bg-indigo-50" },
              ].map(item => (
                <div key={item.label} className={`${item.bg} rounded-2xl p-4`}>
                  <p className="text-gray-400 text-[10px] font-black uppercase">{item.label}</p>
                  <p className={`text-xl font-black mt-1 ${item.color}`}>{item.val}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const MENU = [
      { key:"dashboard", icon:"🏠", label:"Início",       color:"text-pink-500",    bg:"bg-pink-100"    },
      { key:"produtos",  icon:"📦", label:"Produtos",     color:"text-purple-500",  bg:"bg-purple-100"  },
      { key:"vendas",    icon:"🛒", label:"Vender",       color:"text-cyan-500",    bg:"bg-cyan-100"    },
      { key:"estoque",   icon:"📋", label:"Estoque",      color:"text-yellow-500",  bg:"bg-yellow-100"  },
      { key:"saidas",    icon:"💸", label:"Saídas Caixa", color:"text-red-500",     bg:"bg-red-100"     },
      { key:"boletos",   icon:"🧾", label:"Boletos",      color:"text-orange-500",  bg:"bg-orange-100"  },
      { key:"clientes",  icon:"👥", label:"Clientes",     color:"text-teal-500",    bg:"bg-teal-100"    },
      { key:"datas",     icon:"📅", label:"Datas",        color:"text-purple-500",  bg:"bg-purple-100"  },
      { key:"meta",      icon:"🎯", label:"Meta",         color:"text-indigo-500",  bg:"bg-indigo-100",  adminOnly: true },
      { key:"historico", icon:"📊", label:"Relatório",    color:"text-emerald-500", bg:"bg-emerald-100" },
    ];

    function App() {
      const [logado,       setLogado]       = useState(false);
      const [usuario,      setUsuario]      = useState("");
      const [isAdmin,      setIsAdmin]      = useState(false);
      const [tela,         setTela]         = useState("dashboard");
      const [produtos,     setProdutos]     = useState([]);
      const [vendas,       setVendas]       = useState([]);
      const [saidas,       setSaidas]       = useState([]);
      const [clientes,     setClientes]     = useState([]);
      const [toasts,       setToasts]       = useState([]);
      const [sideOpen,     setSideOpen]     = useState(false);
      const [carregando,   setCarregando]   = useState(false);
      const [caixaAberto,  setCaixaAberto]  = useState(false);
      const [valorCaixa,   setValorCaixa]   = useState(0);
      const [modalCaixa,   setModalCaixa]   = useState(false);
      const [valorInicial, setValorInicial] = useState("");
      const [carrinho,          setCarrinho]          = useState([]);
      const [modalVenda,        setModalVenda]        = useState(false);
      const [alertaCaixaAnterior, setAlertaCaixaAnterior] = useState(null);
      const api = useApi();

      function addToast(msg, type = "success") {
        const id = Date.now() + Math.random();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4200);
      }

      async function handleLogin(u, role) {
        setLogado(true); setUsuario(u); setIsAdmin(role === "admin");
        setCarregando(true);
        const res = await api.call("getCaixaAberto");
        setCarregando(false);
        const d = new Date();
        const hoje = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        if (res.success && res.data && !res.data.fechado) {
          // dataISO pode estar em UTC (registros antigos) ou local (registros novos).
          // Converte UTC→local para cobrir ambos os casos.
          const utcRef = new Date(res.data.dataISO); // interpreta como UTC midnight
          const storedLocal = `${utcRef.getFullYear()}-${String(utcRef.getMonth()+1).padStart(2,"0")}-${String(utcRef.getDate()).padStart(2,"0")}`;
          const ehHoje = res.data.dataISO === hoje || storedLocal === hoje;
          if (ehHoje) {
            setCaixaAberto(true);
            setValorCaixa(Number(res.data.valorInicial) || 0);
          } else {
            // Usa a data local (UTC→local) para exibir o alerta corretamente
            const [ano, mes, dia] = storedLocal.split("-");
            setAlertaCaixaAnterior(`${dia}/${mes}/${ano}`);
            setModalCaixa(true);
          }
        } else {
          setModalCaixa(true);
        }
      }

      async function abrirCaixa() {
        const val = parseFloat(valorInicial.replace(",", "."));
        if (isNaN(val) || val < 0) return addToast("Informe um valor válido.", "error");
        const res = await api.call("abrirCaixa", { caixa: { valorInicial: val, usuario: usuario } });
        if (!res.success) return addToast("Erro ao abrir caixa: " + res.error, "error");
        setValorCaixa(val); setCaixaAberto(true); setModalCaixa(false);
        addToast("Caixa aberto com sucesso!");
      }

      useEffect(() => {
        if (!logado || !caixaAberto) return;
        setCarregando(true);
        Promise.all([
          api.call("getProdutos"),
          api.call("getVendas"),
          api.call("getSaidasCaixa"),
          api.call("getClientes"),
        ]).then(([p, v, s, c]) => {
          if (p.success) setProdutos(p.data || []);
          else addToast("Erro ao carregar produtos.", "error");
          if (v.success) setVendas(v.data || []);
          if (s.success) {
            const hoje = new Date().toLocaleDateString("pt-BR");
            setSaidas((s.data || []).filter(saida => saida.data === hoje));
          }
          if (c.success) setClientes(c.data || []);
          setCarregando(false);
        });
      }, [logado, caixaAberto]);

      if (!logado) return <LoginScreen onLogin={handleLogin} />;

      const props = { produtos, setProdutos, vendas, setVendas, addToast, api };
      const vendaProps = { ...props, carrinho, setCarrinho, clientes };

      function renderTela() {
        if (carregando) return (
          <div className="flex flex-col items-center justify-center py-40 gap-4">
            <span className="text-5xl animate-spin-slow">⏳</span>
            <p className="text-gray-400 font-bold animate-pulse">Carregando dados...</p>
          </div>
        );
        switch(tela) {
          case "dashboard": return <Dashboard {...props} isAdmin={isAdmin} />;
          case "produtos":  return <Produtos  {...props} isAdmin={isAdmin} usuario={usuario} />;
          case "vendas":    return <Vendas    {...vendaProps} />;
          case "estoque":   return <Estoque   {...props} />;
          case "saidas":    return <SaidasCaixa saidas={saidas} setSaidas={setSaidas} addToast={addToast} api={api} />;
          case "boletos":   return <Boletos   addToast={addToast} api={api} />;
          case "clientes":  return <Clientes  addToast={addToast} api={api} clientes={clientes} setClientes={setClientes} />;
          case "datas":     return <DatasComem addToast={addToast} api={api} />;
          case "meta":      return isAdmin ? <MetaAdmin addToast={addToast} api={api} vendas={vendas} /> : null;
          case "historico": return <Historico {...props} saidas={saidas} valorCaixa={valorCaixa} caixaAberto={caixaAberto}
            onFecharCaixa={async () => { await api.call("fecharCaixa"); setCaixaAberto(false); setValorCaixa(0); setValorInicial(""); setVendas([]); setSaidas([]); setCarrinho([]); setAlertaCaixaAnterior(null); setModalCaixa(true); addToast("Caixa fechado! Abra um novo para continuar.", "warn"); setTela("dashboard"); }} />;
          default: return null;
        }
      }

      return (
        <div className="min-h-screen bg-[#fdf4f7] flex">
          <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute -top-24 -right-24 w-[500px] h-[500px] bg-cyan-100/40 rounded-full blur-3xl" />
            <div className="absolute -bottom-24 -left-24 w-[500px] h-[500px] bg-pink-100/40 rounded-full blur-3xl" />
          </div>

          {sideOpen && (<div className="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 md:hidden" onClick={() => setSideOpen(false)} />)}

          <aside className={`sidebar-trans fixed md:relative z-50 flex flex-col w-60 min-h-screen bg-white border-r-2 border-pink-100 shadow-lg ${sideOpen ? "translate-x-0" : "-translate-x-full md:translate-x-0"}`}>
            <div className="p-5 border-b-2 border-pink-50 flex flex-col items-center text-center">
              <img src="logo.png" alt="Bibi Papelaria" className="w-24 h-24 object-cover rounded-full drop-shadow-md mb-1" />
              <p className="text-gray-400 text-[10px] font-black bg-gray-50 px-3 py-1 rounded-full mt-1">{usuario}</p>
              {caixaAberto && (<p className="text-emerald-500 text-[10px] font-black bg-emerald-50 px-3 py-1 rounded-full mt-1">Caixa Aberto</p>)}
            </div>
            <nav className="flex-1 p-3 flex flex-col gap-1">
              {MENU.filter(m => !m.adminOnly || isAdmin).map(m => {
                const ativo = tela === m.key;
                return (
                  <button key={m.key} onClick={() => { setTela(m.key); setSideOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-bold transition-all ${ativo ? `${m.bg} ${m.color} shadow-sm` : "text-gray-500 hover:bg-gray-50 hover:text-gray-700"}`}>
                    <span className="text-xl">{m.icon}</span>
                    {m.label}
                    {ativo && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-current opacity-60" />}
                  </button>
                );
              })}
            </nav>
            <div className="p-3 border-t-2 border-pink-50">
              <button onClick={() => { setLogado(false); setUsuario(""); setIsAdmin(false); setProdutos([]); setVendas([]); setSaidas([]); setClientes([]); setTela("dashboard"); setCaixaAberto(false); setValorCaixa(0); }}
                className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-2xl text-sm font-bold text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                Sair
              </button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-h-screen relative z-10 overflow-hidden">
            <div className="md:hidden flex items-center gap-3 p-4 border-b-2 border-pink-100 bg-white sticky top-0 z-30 shadow-sm">
              <button onClick={() => setSideOpen(true)} className="w-10 h-10 rounded-xl bg-pink-50 text-pink-500 font-bold flex items-center justify-center text-xl">☰</button>
              <img src="logo.png" className="w-8 h-8 object-cover rounded-full" alt="" />
              <span className="text-pink-500 font-black">Bibi Papelaria</span>
            </div>
            <div className="flex-1 p-4 md:p-7 overflow-y-auto w-full max-w-7xl mx-auto">{renderTela()}</div>
          </main>

          <Toast toasts={toasts} />

          {caixaAberto && (
            <button onClick={() => setModalVenda(true)}
              className="fixed bottom-6 right-6 z-[80] flex items-center gap-3 bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-white font-black rounded-full shadow-2xl transition-all"
              style={{ padding: carrinho.length > 0 ? "14px 22px 14px 18px" : "18px" }} title="Nova Venda">
              <svg xmlns="http://www.w3.org/2000/svg" className="w-7 h-7 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z" />
              </svg>
              {carrinho.length > 0 && (
                <span className="flex items-center gap-2 text-base">
                  <span className="bg-white text-emerald-600 rounded-full w-6 h-6 flex items-center justify-center text-xs font-black">{carrinho.length}</span>
                  Vender
                </span>
              )}
            </button>
          )}

          {modalVenda && (
            <div className="fixed inset-0 z-[90] flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm p-0 sm:p-4"
                 onClick={e => e.target === e.currentTarget && setModalVenda(false)}>
              <div className="animate-bounceIn bg-white w-full sm:max-w-2xl rounded-t-3xl sm:rounded-3xl shadow-2xl flex flex-col max-h-[92vh] overflow-hidden">
                <div className="flex items-center justify-between px-5 py-4 border-b-2 border-gray-100">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-emerald-100 rounded-2xl flex items-center justify-center">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z" />
                      </svg>
                    </div>
                    <h2 className="text-xl font-black text-gray-800">Nova Venda</h2>
                    {carrinho.length > 0 && (<span className="bg-emerald-100 text-emerald-600 text-xs font-black px-2.5 py-1 rounded-full">{carrinho.length} item(s)</span>)}
                  </div>
                  <button onClick={() => setModalVenda(false)} className="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 font-bold text-lg transition-colors">✕</button>
                </div>
                <div className="flex-1 overflow-y-auto p-4">
                  <VendaInline {...vendaProps} onVendaFinalizada={() => setModalVenda(false)} />
                </div>
              </div>
            </div>
          )}

          <Modal open={modalCaixa} onClose={() => {}} title="Abrir Caixa" bloqueado={true}>
            <div className="flex flex-col gap-4">
              {alertaCaixaAnterior && (
                <div className="bg-amber-50 border-2 border-amber-300 rounded-2xl p-4">
                  <div className="flex items-start gap-3">
                    <span className="text-2xl shrink-0">⚠️</span>
                    <div>
                      <p className="text-amber-700 font-black text-sm">Caixa não foi fechado!</p>
                      <p className="text-amber-600 font-semibold text-sm mt-0.5">O caixa do dia <strong>{alertaCaixaAnterior}</strong> não foi fechado. Favor conferir os valores antes de continuar.</p>
                    </div>
                  </div>
                </div>
              )}
              <div className="bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-4 text-center">
                <span className="text-4xl">💰</span>
                <p className="text-emerald-600 font-black text-lg mt-2">Abertura de Caixa</p>
                <p className="text-emerald-500 text-sm mt-1">Informe o valor inicial em caixa</p>
              </div>
              <Field label="Valor Inicial (R$)">
                <input type="number" step="0.01" min="0" className={inputCls} placeholder="0.00" value={valorInicial} onChange={e => setValorInicial(e.target.value)} />
              </Field>
              <button onClick={abrirCaixa}
                className="lift w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black rounded-2xl py-3.5 shadow-md transition-all text-base">
                Abrir Caixa
              </button>
            </div>
          </Modal>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
